<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘鍋 x 一點甜｜數位會員中心</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main-red: #8b0000; --line-green: #06C755; --bg-cream: #fdf5e6; --text-gray: #333; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: var(--bg-cream); margin: 0; padding: 15px; display: flex; justify-content: center; font-size: 17px; color: var(--text-gray); }
        .card { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--main-red); box-sizing: border-box; text-align: left; }
        h2 { color: var(--main-red); margin: 0 0 15px 0; text-align: center; font-size: 22px; }
        .center { text-align: center; }
        .loading-box { padding: 100px 0; color: #999; text-align: center; }
        .spinner { width: 35px; height: 35px; border: 4px solid #eee; border-top: 4px solid var(--main-red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .qr-box { text-align: center; margin: 15px 0; }
        .qr-box img { width: 200px; height: 200px; border: 1px solid #eee; padding: 8px; background: #fff; }
        .point-badge { background: var(--main-red); color: white; padding: 20px; border-radius: 15px; margin: 20px 0; text-align: center; }
        .point-badge h1 { margin: 5px 0; font-size: 36px; }
        .form-group { margin-top: 20px; }
        label { font-weight: bold; margin-bottom: 8px; display: block; font-size: 16px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 17px; }
        .check-group { font-size: 14px; color: #444; margin: 15px 0; display: flex; align-items: flex-start; line-height: 1.6; }
        .check-group input { width: 22px; height: 22px; margin-right: 12px; flex-shrink: 0; margin-bottom: 0; }
        .check-link { color: var(--main-red); font-weight: bold; text-decoration: underline; cursor: pointer; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-reg { background: var(--main-red); color: white; }
        .btn-share { background: var(--line-green); color: white; margin-top: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-header { font-size: 20px; font-weight: bold; color: var(--main-red); margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; }
        .modal-body { font-size: 15px; line-height: 1.7; text-align: left; white-space: pre-wrap; color: #333; }
        .close-btn { background: var(--main-red); color: white; margin-top: 20px; }
        #ui-member, #ui-guest { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>老娘鍋 x 一點甜</h2>
        <div id="ui-loading" class="loading-box"><div class="spinner"></div>同步系統資料中...</div>

        <div id="ui-member">
            <p id="userNameDisplay" class="center" style="font-weight:bold;"></p>
            <div class="qr-box">
                <img id="memberQr" src="">
                <p style="font-size:14px; color:var(--main-red); font-weight:bold; margin-top:10px;" class="center">結帳請出示此碼集點，離店離櫃恕不補積點</p>
            </div>
            <div style="text-align: left; font-size: 15px; color: #444; line-height: 1.8; background: #fdfaf6; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee;">
                • 點數價值：<strong>$1 點 = NT$1 元</strong><br>
                • 專屬回饋：本人消費享 <strong>5% 回饋點數</strong><br>
                • 推薦回饋：享好友消費 <strong>2% 回饋點數</strong>
            </div>
            <div class="point-badge">
                <p style="margin:0; font-size:15px; opacity:0.8;">目前可用點數</p>
                <h1 id="userPoints">0 點</h1>
            </div>
            <button class="btn-share" onclick="handleShare()">推薦好友領招待禮</button>
        </div>

        <div id="ui-guest">
            <div style="background:#fff5f5; border:2px dashed var(--main-red); padding:15px; border-radius:15px; text-align:center;">
                <p style="margin:0; font-weight:bold; color:var(--main-red); font-size:18px;">🎁 好友專屬招待禮</p>
                <div class="qr-box"><img id="guestQr" src=""></div>
                <div style="font-size:16px; color:#444; line-height:1.6; text-align:center; margin-top:10px;">
                    點餐前出示此碼<br>
                    老娘鍋消費送<strong>小菜一份</strong><br>
                    或一點甜消費送<strong>霜淇淋一支</strong><br>
                    <span style="font-size:14px; color:#888; display:block; margin-top:5px;">（本優惠碼限用一次）</span>
                </div>
            </div>
            <div class="form-group">
                <label>真實姓名</label>
                <input type="text" id="regName" placeholder="請輸入姓名">
                <label>手機號碼</label>
                <input type="tel" id="regPhone" placeholder="09xxxxxxxx">
                <label>生日 (領取壽星優惠/註冊後不可修改)</label>
                <input type="date" id="regBirth" value="2000-01-01">
                <label class="check-group">
                    <input type="checkbox" id="checkRights">
                    <span>我已閱讀並同意 <span class="check-link" onclick="openModal('rights')">【會員權益與點數規則】</span></span>
                </label>
                <label class="check-group">
                    <input type="checkbox" id="checkLegal">
                    <span>我已同意 <span class="check-link" onclick="openModal('legal')">【法務免責與規章聲明】</span></span>
                </label>
                <button class="btn-reg" id="regBtn" onclick="register()">立即加入會員並領取招待</button>
            </div>
        </div>
    </div>

    <div id="customModal" class="modal">
        <div class="modal-content">
            <div id="modalTitle" class="modal-header"></div>
            <div id="modalBody" class="modal-body"></div>
            <button class="close-btn" onclick="closeModal()">我理解了</button>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec";
    const LIFF_ID = "2009625010-p9sVIUWe";
    let myId = "";

    const TEXT_RIGHTS = `【會員權益】\n◆ 點數價值： $1 點 = NT$1 元。\n◆ 本人集點： 以「實付金額（折抵/折扣後）」之 5% 計算。\n效期：取得日起 12 個月。\n◆ 朋友回饋： 以朋友消費實付額之 2% 計算。\n效期：取得日起 6 個月。\n◆ 生效時間： 採 隔日生效制（今日取得，明日 00:00 後方可使用）。\n◆ 購買餐券： 提撥 3% 點數（該筆交易不可使用點數折抵）。\n◆ 使用餐券消費： 扣除餐券面額後之剩餘實付金額，提撥 5% 點數。\n◆ 特殊日期折抵： 春節、母親節或特殊活動檔期，暫停折抵功能，僅限集點。\n◆ 特殊活動檔期 (如鍋友日、周年慶)：本人集點 3%，朋友回饋 1%`;
    const TEXT_LEGAL = `【法務免責與規章聲明】\n◆ 非現金化： 點數不具現金價值，不可要求兌換現金或轉讓。\n◆ 終止權： 店家保有修改、暫停或終止活動之權利。\n◆ 營運調整： 若因營運調整或不可抗力因素，點數自動失效，不得要求賠償。\n◆ 最終解釋權：本公司保有活動最終解釋權。\n◆ 誠信原則監測： 系統會監測異常頻繁集點或疑似虛假推薦，店家有權直接凍結帳號並清空點數，不另行通知。\n◆ 權益終止：若判定為惡意集點或違反公平使用原則，店家有權直接凍結帳號並清空點數，不另行通知。`;

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            myId = profile.userId;
            checkMember();
        } catch (e) { console.error(e); }
    }

    async function checkMember() {
        try {
            const res = await fetch(`${GAS_URL}?action=checkID&userId=${myId}`, { redirect: 'follow' });
            const data = await res.json();
            document.getElementById('ui-loading').style.display = 'none';
            if (data.isMember) {
                document.getElementById('ui-member').style.display = 'block';
                document.getElementById('ui-guest').style.display = 'none';
                document.getElementById('userNameDisplay').innerText = `歡迎，${data.userName} 會員`;
                document.getElementById('userPoints').innerText = `${data.points} pt`;
                document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${myId}`;
            } else {
                showGuestUI();
            }
        } catch (e) { showGuestUI(); }
    }

    function showGuestUI() {
        document.getElementById('ui-loading').style.display = 'none';
        document.getElementById('ui-member').style.display = 'none';
        document.getElementById('ui-guest').style.display = 'block';
        const urlParams = new URLSearchParams(window.location.search);
        const rid = urlParams.get('referrerId') || myId;
        // 關鍵修改：如果是被推薦人，生成的碼要帶有 GIFT_BY_ 前綴
    if (rid) {
        document.getElementById('guestQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=GIFT_BY_${rid}`;
    } else {
        // 如果連推薦人都沒有，就單純顯示註冊 QR (可不顯示碼)
        document.getElementById('guestQr').style.display = 'none';
    }
}

    // 1. 這段負責讓客人在打字時「自動跳出連字號」 (放在 register 函數外面)
document.getElementById('regPhone').addEventListener('input', function (e) {
    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,4})(\d{0,3})(\d{0,3})/);
    e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
});

async function register() {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const birth = document.getElementById('regBirth').value;

    // --- 關鍵修改：強制檢查格式 (一定要 09XX-XXX-XXX) ---
    const phoneReg = /^09\d{2}-\d{3}-\d{3}$/;
    if (!phoneReg.test(phone)) {
        alert("請輸入正確的手機號碼格式：09XX-XXX-XXX");
        // 如果格式不對，就把按鈕恢復，停止執行
        document.getElementById('regBtn').disabled = false;
        document.getElementById('regBtn').innerText = "立即加入會員並領取招待";
        return; 
    }
    // ------------------------------------------------

    if (!name || !phone || !birth) { openModal('formError'); return; }
    if (!document.getElementById('checkRights').checked || !document.getElementById('checkLegal').checked) { openModal('checkError'); return; }
    
    document.getElementById('regBtn').disabled = true;
    document.getElementById('regBtn').innerText = "處理中...";
    
    try {
        const rid = new URLSearchParams(window.location.search).get('referrerId') || "";
        await fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ action: "register", name, phone, birthday: birth, userId: myId, referrerId: rid })
        });
        openModal('regSuccess');
        setTimeout(checkMember, 3000);
    } catch (e) { 
        document.getElementById('regBtn').disabled = false;
        document.getElementById('regBtn').innerText = "立即加入會員並領取招待";
        openModal('connectError');
    }
}
    function handleShare() {
        const shareUrl = `https://oldmapot.github.io/Member_Master/index.html?referrerId=${myId}`;
        const copyText = `✨ 發現高雄隱藏版美味 ✨\n🍲 老娘鍋 x 一點甜 🍦\n\n這是我專屬的招待回饋碼\n立即加入會員領取招待禮\n消費再享點數回饋！\n\n👉 點我領取：${shareUrl}`;

        const el = document.createElement('textarea');
        el.value = copyText;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

        if (liff.isApiAvailable('shareTargetPicker')) {
            liff.shareTargetPicker([{
                "type": "flex",
                "altText": "🎁 你的好友送你老娘鍋招待禮！",
                "contents": {
                    "type": "bubble",
                    "hero": { "type": "image", "url": "https://images.unsplash.com/photo-1590671886400-8f8088b97cb0?q=80&w=1000&auto=format&fit=crop", "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                    "body": { "type": "box", "layout": "vertical", "contents": [
                        {"type": "text", "text": "老娘鍋 x 一點甜", "weight": "bold", "color": "#8b0000", "size": "sm"},
                        {"type": "text", "text": "好友專屬招待禮 🍲", "weight": "bold", "size": "xl", "margin": "md"},
                        {"type": "text", "text": "送你招待券，加入再領回饋點數！", "wrap": true, "size": "xs", "margin": "md", "color": "#666666"}
                    ]},
                    "footer": { "type": "box", "layout": "vertical", "contents": [
                        { "type": "button", "action": { "type": "uri", "label": "立即領取", "uri": shareUrl }, "style": "primary", "color": "#8b0000" }
                    ]}
                }
            }]).then(function (res) {
                openModal('copySuccess');
            }).catch(function (err) {
                openModal('copySuccess');
            });
        } else {
            openModal('copySuccess');
        }
    }

    function openModal(type) {
        const modal = document.getElementById('customModal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        body.style.textAlign = "left"; 

        if (type === 'rights') { 
            title.innerText = "會員權益與點數規則"; 
            body.innerText = TEXT_RIGHTS; 
        } else if (type === 'legal') { 
            title.innerText = "法務免責與規章聲明"; 
            body.innerText = TEXT_LEGAL; 
        } else if (type === 'copySuccess') {
            title.innerText = "連結複製成功！";
            body.innerHTML = `<div style="text-align:center; padding:15px;"><p style="font-size:20px; margin:0;">🎉 推薦連結已準備好</p><p style="color:#666; margin-top:10px;">您可以直接貼給好友，邀請他們領招待禮並幫您累積點數！</p></div>`;
        } else if (type === 'regSuccess') {
            title.innerText = "註冊成功！";
            body.innerHTML = `<div style="text-align:center; padding:15px;"><p style="font-size:20px; color:#06C755; margin:0;">恭喜加入老娘家族！</p><p style="color:#666; margin-top:10px;">系統正在同步您的資料...<br>即將跳轉至個人中心。</p></div>`;
        } else if (type === 'formError') {
            title.innerText = "提醒";
            body.innerText = "請填寫完整的姓名、電話與生日資訊喔！";
        } else if (type === 'checkError') {
            title.innerText = "提醒";
            body.innerText = "請勾選並同意會員條款與聲明。";
        } else if (type === 'connectError') {
            title.innerText = "連線失敗";
            body.innerText = "目前通訊不穩定，請稍後再試一次。";
        }
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
    }

    init();
    
</script>
</body>
</html>

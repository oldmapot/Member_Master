<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老娘鍋 x 一點甜 會員中心</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: #fdf5e6; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .card { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); align-self: center; }
        h2 { color: #8b0000; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #8b0000; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="card" id="formBox" style="display:none;">
        <h2>老娘鍋 x 一點甜</h2>
        <p style="text-align:center; color:#666;">加入會員領取專屬招待禮</p>
        <input type="text" id="name" placeholder="請輸入姓名">
        <input type="tel" id="phone" placeholder="請輸入手機號碼">
        <input type="date" id="birthday">
        <button id="submitBtn" onclick="submitForm()">確認註冊</button>
    </div>

<script>
    let userId = "";
    const gasUrl = "https://script.google.com/macros/s/AKfycbwwXAPVNQ-CJ3MfcxBebxtthvHGwrK9YTXGS_a5yqL2Ss7JAF1jJoAFSHOHWx-AdhT-Cw/exec"; 

    async function initLIFF() {
        try {
            await liff.init({ liffId: "2009625010-p9sVIUWe" }); 
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                userId = profile.userId;
                checkMembership(userId);
            } else {
                liff.login();
            }
        } catch (e) { console.error("LIFF 失敗", e); }
    }
    initLIFF();

    function checkMembership(id) {
        fetch(gasUrl + "?action=checkID&userId=" + id, { cache: "no-cache" })
        .then(res => res.json())
        .then(res => {
            if (res.isMember) {
                // 🚀 重點：這裡必須傳入 4 個參數，QR Code 才會畫出來
                showSuccess(`歡迎回來，${res.userName}！`, res.points, id, res.userName);
            } else {
                document.getElementById('formBox').style.display = 'block';
            }
        })
        .catch(err => {
            document.getElementById('formBox').style.display = 'block';
        });
    }

    async function submitForm() {
        const btn = document.getElementById('submitBtn');
        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('referrerId') || "";

        const data = {
            action: "register",
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            birthday: document.getElementById('birthday').value,
            userId: userId,
            referrerId: referrerId
        };

        if(!data.name || !data.phone || !userId) {
            alert("請填寫完整資料"); return;
        }

        btn.disabled = true;
        btn.innerText = "正在為您綁定...";

        fetch(gasUrl, {
            method: "POST",
            mode: "no-cors", 
            body: JSON.stringify(data)
        });

        setTimeout(() => {
            alert("註冊成功！歡迎加入老娘鍋！");
            location.reload(); // 註冊完重新整理直接進入會員卡
        }, 1200);
    }

    function showSuccess(title, points, id, userName) {
        const qrCodeUrl = `https://chart.googleapis.com/chart?cht=qr&chs=250x250&chl=${id}`;
        const shareUrl = `https://oldmapot.github.io/Member_Master/index.html?referrerId=${id}`;

        document.body.innerHTML = `
            <div style="text-align:center; padding:20px; background-color:#fdf5e6; min-height:100vh; display:flex; flex-direction:column; align-items:center; font-family:sans-serif; width:100%;">
                <div style="background:white; padding:25px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:90%; max-width:350px; border:2px solid #8b0000;">
                    <h2 style="color:#8b0000; margin:0;">老娘鍋 x 一點甜</h2>
                    <p style="color:#666; font-size:14px; margin-top:5px;">${userName} 的行動會員卡</p>
                    
                    <div style="margin: 20px 0; background:#fff; padding:10px; display:inline-block; border-radius:10px; border:1px solid #eee;">
                        <img src="${qrCodeUrl}" alt="集點碼" style="width:200px; display:block;">
                        <p style="font-size:12px; color:#8b0000; margin-top:8px; font-weight:bold;">結帳請出示此碼集點</p>
                    </div>

                    <div style="background:#8b0000; color:white; padding:15px; border-radius:15px; margin-bottom:20px;">
                        <p style="margin:0; font-size:14px; opacity:0.8;">目前可用點數</p>
                        <h1 style="margin:5px 0; font-size:36px;">${points} <span style="font-size:16px;">pt</span></h1>
                    </div>

                    <button onclick="shareToFriend('${id}')" style="width:100%; padding:15px; background:#06C755; color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:12px;">
                        LINE 分享好友拿招待
                    </button>
                    
                    <button onclick="liff.closeWindow()" style="width:100%; padding:12px; background:#eee; color:#333; border:none; border-radius:10px; font-size:14px; cursor:pointer;">
                        返回聊天室
                    </button>
                </div>
                <p style="font-size:12px; color:#8b0000; margin-top:15px; line-height:1.5;">
                    ※ 點數於消費隔日凌晨生效<br>
                    ※ 推薦好友成功消費再享 2% 回饋
                </p>
            </div>`;
    }

    function shareToFriend(id) {
        const shareUrl = `https://oldmapot.github.io/Member_Master/index.html?referrerId=${id}`;
        
        if (liff.isApiAvailable('shareTargetPicker')) {
            liff.shareTargetPicker([
                {
                    "type": "flex",
                    "altText": "🎁 你的好友送你老娘鍋專屬招待禮！",
                    "contents": {
                        "type": "bubble",
                        "hero": {
                            "type": "image",
                            "url": "https://images.unsplash.com/photo-1590671886400-8f8088b97cb0?q=80&w=1000&auto=format&fit=crop",
                            "size": "full",
                            "aspectRatio": "20:13",
                            "aspectMode": "cover"
                        },
                        "body": {
                            "type": "box",
                            "layout": "vertical",
                            "contents": [
                                {"type": "text", "text": "老娘鍋 x 一點甜", "weight": "bold", "color": "#8b0000", "size": "sm"},
                                {"type": "text", "text": "好友專屬招待禮 🍲", "weight": "bold", "size": "xl", "margin": "md"},
                                {"type": "text", "text": "透過此連結註冊，結帳出示 QR Code 即享小菜/點心招待，還可累積消費回饋！", "wrap": true, "size": "xs", "margin": "md", "color": "#666666"}
                            ]
                        },
                        "footer": {
                            "type": "box",
                            "layout": "vertical",
                            "contents": [
                                {
                                    "type": "button",
                                    "action": { "type": "uri", "label": "立即領取招待", "uri": shareUrl },
                                    "style": "primary",
                                    "color": "#8b0000"
                                }
                            ]
                        }
                    }
                }
            ]).then(res => {
                if (res) alert("已成功分享給好友！");
            }).catch(err => console.log("分享取消"));
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = `✨ 發現高雄隱藏版美味！老娘鍋 x 一點甜 ✨\n\n點擊連結註冊，結帳出示我的 QR Code 享招待：\n${shareUrl}`;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            alert("推薦文案已複製！快貼給朋友吧～");
        }
    }
</script>
</body>
</html>

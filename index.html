<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘的一點心意</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #8b0000; --bg: #fdf5e6; --accent: #ffd700; --sweet: #ff69b4; }
        .theme-sweet { --primary: #FFB7D5; --bg: #FFF9E6; --accent: #ff69b4; }
        
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 50px; }
        .header { background: var(--primary); color: white; padding: 30px 20px 45px; text-align: center; border-radius: 0 0 30px 30px; position: relative; }
        
        /* 點數卡片 */
        .points-card { background: white; margin: -25px 20px 20px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; position: relative; z-index: 10; }
        .points-val { font-size: 42px; font-weight: bold; color: var(--primary); margin: 5px 0; }

        /* 品牌活動按鈕區 */
        .brand-btns { display: flex; gap: 15px; padding: 0 20px; margin-bottom: 20px; }
        .brand-btn { 
            flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .btn-pot { background: #8b0000; color: #ffd700; }
        .btn-sweet { background: #FFB7D5; color: #fff; }
        .brand-btn:active { transform: scale(0.95); }

        /* 彈出卡片 (Modal) */
        .modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.6); display: none; z-index: 3000; 
            align-items: center; justify-content: center;
        }
        .modal-card { 
            background: white; width: 85%; max-width: 400px; border-radius: 25px; 
            padding: 25px; position: relative; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .event-item { padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 15px; display: flex; align-items: flex-start; gap: 8px; }
        .event-item:last-child { border-bottom: none; }
        .close-modal { background: #eee; border: none; width: 100%; padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; }

        /* 原有樣式 */
        .qr-section { text-align: center; margin: 0 20px 20px; padding: 20px; background: white; border-radius: 20px; }
        #qrcode { width: 160px; height: 160px; }
        .share-btn { background: #06C755; color: white; border: none; padding: 18px; border-radius: 15px; width: calc(100% - 40px); margin: 0 20px; font-weight: bold; font-size: 18px; }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf5e6; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        /* 鍋子動畫省略，保留原有 CSS */
    </style>
</head>
<body>

<div id="loading">
    <div style="text-align: center;">
        <div class="pot-loader"><div class="steam"></div><div class="pot-body"></div></div>
        <div id="loading-quote" style="margin-top: 20px; color: #8b0000; font-weight: bold;">正在加熱湯頭...</div>
    </div>
</div>

<div id="memberUI" style="display: none;">
    <div class="header">
        <div id="welcome-quote">正在取出心意...</div>
        <div style="font-size: 18px; font-weight: bold;">會員中心</div>
    </div>

    <div class="points-card">
        <div style="font-size: 14px; color: #666;">可用資產點數</div>
        <div class="points-val" id="points-display">--</div>
        <div style="font-size: 12px; color: #aaa;" onclick="fetchData()">↻ 點擊重新整理</div>
    </div>

    <div class="brand-btns">
        <button class="brand-btn btn-pot" onclick="showEvents('pot')">
            <span>🔥</span> 老娘精選活動
        </button>
        <button class="brand-btn btn-sweet" onclick="showEvents('sweet')">
            <span>🍰</span> 一點甜好康
        </button>
    </div>

    <div class="qr-section">
        <img id="qrcode" src="">
        <p style="font-size: 12px; color: #666; margin-top: 10px;">結帳時請出示此碼，離店離櫃恕不補集點</p>
    </div>

    <button class="share-btn" onclick="shareReferral()">🚀 分享推薦碼給好友</button>
</div>

<div class="modal-overlay" id="eventModal" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-title" id="modalTitle">最新活動</div>
        <div id="eventList">
            </div>
        <button class="close-modal" onclick="document.getElementById('eventModal').style.display='none'">我知道了</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec"; 
    const LIFF_ID = "2009625010-p9sVIUWe";
    let myId = "";
    let allEvents = { pot: [], sweet: [] }; // 儲存兩家品牌的活動

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        myId = profile.userId;
        document.getElementById('qrcode').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${myId}`;
        fetchData();
    }

    async function fetchData() {
        document.getElementById('loading').style.display = 'flex';
        try {
            // 注意：這裡我們一次抓取兩邊的資料，或是由 GAS 回傳時就包含兩邊
            const res = await fetch(`${GAS_URL}?action=checkID&userId=${myId}`);
            const data = await res.json();
            
            if (data.isMember) {
                document.getElementById('memberUI').style.display = 'block';
                document.getElementById('points-display').innerText = data.profile.points;
                document.getElementById('welcome-quote').innerText = data.quote;
                
                // 假設 GAS 修改為回傳分類好的活動
                // 若 GAS 目前只回傳單一品牌，您可以在 GAS 那邊把兩邊都抓出來
                allEvents.pot = data.potEvents || [];
                allEvents.sweet = data.sweetEvents || [];
            }
            document.getElementById('loading').style.display = 'none';
        } catch (e) { alert("網路異常"); }
    }

    function showEvents(type) {
        const list = document.getElementById('eventList');
        const title = document.getElementById('modalTitle');
        const events = type === 'pot' ? allEvents.pot : allEvents.sweet;
        
        title.innerText = type === 'pot' ? '🔥 老娘鍋特選' : '🍰 一點甜放送';
        title.style.color = type === 'pot' ? '#8b0000' : '#ff69b4';

        if (events.length === 0) {
            list.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">目前暫無活動，敬請期待！</div>';
        } else {
            list.innerHTML = events.map(e => `
                <div class="event-item">
                    <span>✨</span>
                    <span>${e}</span>
                </div>
            `).join('');
        }
        document.getElementById('eventModal').style.display = 'flex';
    }

    function closeModal(e) {
        document.getElementById('eventModal').style.display = 'none';
    }

    init();
</script>
</body>
</html>

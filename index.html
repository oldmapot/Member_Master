<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘的一點心意</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root { --primary: #8b0000; --bg: #fdf5e6; --card-bg: #fff; --text: #333; --light-text: #666; --action-btn: #beb1a8; --brand-btn: #ab545a; --success: #06C755; }
        .theme-so { --primary: #b57c82; --bg: #FFF9E6; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding-bottom: 40px; color: var(--text); overflow-x: hidden; }
        
        /* Loading */
        #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 20px; }
        .loader-icon { width: 60px; height: 35px; background: #333; border-radius: 0 0 25px 25px; position: relative; border: 3px solid #222; }
        .loader-icon.omp::after { content: '♨'; position: absolute; top: -30px; left: 12px; font-size: 28px; color: var(--primary); animation: steam 1.2s infinite; }
        .loader-icon.so { width: 55px; height: 40px; background: #ffcc00; border-radius: 15px 15px 8px 8px; border-top: 10px solid #663300; animation: wobble 0.7s infinite; }
        @keyframes steam { 0%{opacity:0;transform:translateY(0)}50%{opacity:1}100%{opacity:0;transform:translateY(-20px)} }
        @keyframes wobble { 0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)} }

        /* Header */
        .header { background: var(--primary); color: #fff; padding: 45px 20px; text-align: center; border-radius: 0 0 30px 30px; position: relative; }
        .menu-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 28px; cursor: pointer; background: none; border: none; color: #fff; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .welcome-quote { font-size: 16px; opacity: 0.9; margin-bottom: 6px; }
        .main-title { font-size: 30px; font-weight: 900; letter-spacing: 1px; }

        /* Side Menu */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card-bg); box-shadow: 4px 0 20px rgba(0,0,0,0.15); z-index: 10001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; }
        .side-menu.open { left: 0; }
        .side-menu-header { background: var(--primary); color: #fff; padding: 40px 20px; text-align: center; }
        .side-menu-item { display: block; width: 100%; padding: 18px 24px; background: none; border: none; text-align: left; font-size: 16px; color: var(--text); border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .side-menu-item:active { background: #f5f5f5; }
        .side-menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; backdrop-filter: blur(2px); }
        .side-menu-overlay.show { display: block; }

        /* Points Card */
        .points-card { background: var(--card-bg); margin: -25px 20px 20px; padding: 25px; border-radius: 24px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); text-align: center; }
        .points-value { font-size: 52px; font-weight: 900; color: var(--primary); margin: 5px 0; }
        .refresh-btn { padding: 6px 14px; border-radius: 10px; background: #f8f8f8; border: 1px solid #eee; font-size: 13px; color: #888; }

        /* Code Section - 固定高度容器 */
        .code-section { background: var(--card-bg); margin: 0 20px 20px; padding: 30px 20px; border-radius: 24px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .code-container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 260px; margin-bottom: 15px; background: #fafafa; border-radius: 16px; border: 1px dashed #ddd; }
        #barcodeCanvas { max-width: 100%; height: 160px !important; }
        #qrcode { width: 200px; height: 200px; padding: 10px; background: #fff; border-radius: 12px; }
        .code-switch-btn { background: var(--brand-btn); color: #fff; border: none; padding: 12px 28px; border-radius: 30px; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(171, 84, 90, 0.3); }
        .code-hint { font-size: 12px; color: #999; margin-top: 15px; }

        /* Actions */
        .brand-actions { display: flex; gap: 12px; margin: 0 20px 20px; }
        .event-brand-btn { flex: 1; padding: 16px; border-radius: 18px; background: var(--brand-btn); color: #fff; font-weight: bold; border: none; }
        .share-btn { display: block; width: calc(100% - 40px); margin: 0 auto; padding: 18px; border-radius: 20px; background: var(--success); color: #fff; font-weight: bold; border: none; }

        /* Register UI - 優化欄位 */
        #regUI { padding: 30px 24px; display: none; }
        .reg-input { width: 100%; height: 56px; padding: 0 16px; border-radius: 14px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; background: #fff; -webkit-appearance: none; }
        .reg-btn { width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; border-radius: 18px; font-weight: bold; font-size: 18px; margin-top: 20px; }
        
        /* Terms */
        .terms-section { background: #fef9f0; border-radius: 16px; padding: 15px; border: 1px solid #ffe0b5; }
        .terms-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #ffe0b5; }
        .terms-item:last-child { border-bottom: none; }
        .terms-item input { width: 22px; height: 22px; accent-color: var(--primary); }
        .terms-item label { font-size: 14px; color: #444; flex: 1; }
        .red-link { color: #d00; font-weight: bold; text-decoration: underline; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 20000; padding: 20px; }
        .modal-card { background: #fff; width: 100%; max-width: 400px; border-radius: 28px; overflow: hidden; animation: pop 0.3s ease; }
        @keyframes pop { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-body { padding: 25px; max-height: 70vh; overflow-y: auto; line-height: 1.6; }
        .modal-close { width: 100%; padding: 18px; border: none; background: #f5f5f5; font-weight: bold; color: #666; }

        /* Table */
        .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .history-table th { background: #f9f9f9; padding: 10px; color: #888; font-weight: normal; }
        .history-table td { padding: 12px 5px; text-align: center; border-bottom: 1px solid #eee; }

        .toast { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 50px; z-index: 30000; display: none; font-size: 14px; }
    </style>
</head>
<body>

<div id="loading">
    <div id="loader" class="loader-icon omp"></div>
    <div id="loading-text" style="font-weight: bold; color: var(--primary);">讀取中...</div>
</div>

<div id="memberUI" style="display:none">
    <div class="header">
        <button class="menu-icon" onclick="openSideMenu()">☰</button>
        <div class="welcome-quote" id="welcomeQuote"></div>
        <div class="main-title">老娘的一點心意</div>
    </div>
    
    <div id="sideMenuOverlay" class="side-menu-overlay" onclick="closeSideMenu()"></div>
    <div id="sideMenu" class="side-menu">
        <div class="side-menu-header"><h3>功能選單</h3></div>
        <div class="side-menu-items">
            <button class="side-menu-item" onclick="openProfile()">👤 個人資料</button>
            <button class="side-menu-item" onclick="openReferral()">👥 推薦名單</button>
            <button class="side-menu-item" onclick="openHistory()">📜 點數明細</button>
            <button class="side-menu-item" onclick="openShopInfo()">🏪 店面資訊</button>
            <button class="side-menu-item" onclick="openRightsDetail()">📋 會員權益</button>
            <button class="side-menu-item" onclick="openLegalDetail()">⚖️ 法務免責聲明</button>
        </div>
    </div>

    <div class="points-card">
        <div style="font-size:14px; color:#999;">可用點數資產</div>
        <div class="points-value" id="pointsDisplay">--</div>
        <button class="refresh-btn" onclick="fetchData(true)">🔄 重新整理</button>
    </div>

    <div class="code-section">
        <div class="code-container">
            <canvas id="barcodeCanvas"></canvas>
            <img id="qrcode" src="" style="display:none">
            <div id="codeText" style="margin-top:10px; font-weight:bold; letter-spacing:1px; color:#555;"></div>
        </div>
        <button class="code-switch-btn" id="switchCodeBtn" onclick="toggleCodeDisplay()">🔁 切換至 QR Code</button>
        <div class="code-hint">結帳時請出示此碼，離開櫃台恕不補發</div>
    </div>

    <div class="brand-actions">
        <button class="event-brand-btn" onclick="openEvents('omp')">老娘精選</button>
        <button class="event-brand-btn" onclick="openEvents('so')">一點甜好康</button>
    </div>
    <button class="share-btn" onclick="autoCopyShare()">🚀 分享推薦碼，領點數回饋</button>
</div>

<div id="regUI">
    <h2 style="text-align:center; color:var(--primary); margin-bottom:25px;">加入會員</h2>
    <input id="regName" class="reg-input" placeholder="姓名 *">
    <input id="regPhone" class="reg-input" type="tel" placeholder="手機 09XX-XXX-XXX *" maxlength="12">
    <label style="display:block; margin:5px 0 5px 5px; font-weight:bold; font-size:14px; color:var(--primary)">🎂 生日 (註冊後不可修改) *</label>
    <input type="date" id="regBirthday" class="reg-input">
    
    <div class="terms-section">
        <div class="terms-item">
            <input type="checkbox" id="agreeRights">
            <label>我已閱讀並理解 <span class="red-link" onclick="viewTerms('rights')">會員權益</span> *</label>
        </div>
        <div class="terms-item">
            <input type="checkbox" id="agreeLegal">
            <label>我已閱讀並同意 <span class="red-link" onclick="viewTerms('legal')">法務免責聲明</span> *</label>
        </div>
    </div>
    <button class="reg-btn" onclick="doRegister()">完成註冊</button>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div id="modalBody" class="modal-body"></div>
        <button class="modal-close" onclick="closeModal()">關閉</button>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec";
const LIFF_ID = "2009625010-p9sVIUWe";
let userId = '', userData = null, currentFrom = 'omp', referrerParam = '';
let isBarcodeMode = true, pendingCheck = null;

function showToast(m) { let t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }
function openSideMenu() { document.getElementById('sideMenu').classList.add('open'); document.getElementById('sideMenuOverlay').classList.add('show'); }
function closeSideMenu() { document.getElementById('sideMenu').classList.remove('open'); document.getElementById('sideMenuOverlay').classList.remove('show'); }
function openModal(h) { document.getElementById('modalBody').innerHTML=h; document.getElementById('modal').style.display='flex'; }
function closeModal() { 
    document.getElementById('modal').style.display='none'; 
    if(pendingCheck) { document.getElementById(pendingCheck).checked = true; pendingCheck = null; }
}

// 條款閱讀
function viewTerms(type) {
    if(type==='rights') {
        pendingCheck = 'agreeRights';
        openModal(`<h3 style="color:var(--primary); text-align:center;">📋 會員權益</h3><p>◆ 點數價值：$1 點 = NT$1 元。</p><p>◆ 消費回饋：實付金額之 5% (本人)，朋友消費之 2% (推薦回饋)。</p><p>◆ 生效時間：採隔日生效制。</p><p>◆ 效期：本人點數12個月，推薦點數6個月。</p>`);
    } else {
        pendingCheck = 'agreeLegal';
        openModal(`<h3 style="color:var(--primary); text-align:center;">⚖️ 法務免責聲明</h3><p>◆ 點數不可兌現。本公司保有活動修改、終止之權利。若有異常操作行為，系統將自動凍結帳號。</p>`);
    }
}

function openRightsDetail() { viewTerms('rights'); pendingCheck = null; closeSideMenu(); }
function openLegalDetail() { viewTerms('legal'); pendingCheck = null; closeSideMenu(); }

function openShopInfo() {
    closeSideMenu();
    if(!userData?.shopInfo?.length) return showToast('暫無資料');
    let h = `<h3 style="text-align:center; color:var(--primary);">🏪 店面資訊</h3>`;
    userData.shopInfo.forEach(shop => {
        h += `<div style="border-bottom:1px solid #eee; padding:15px 0;"><div style="font-weight:bold; color:var(--primary); margin-bottom:5px;">🏠 ${shop.name}</div>`;
        shop.details.forEach(d => {
            h += `<div style="font-size:14px; margin-bottom:3px;"><span style="color:#888;">${d.label}：</span>${d.value}</div>`;
        });
        h += `</div>`;
    });
    openModal(h);
}

// 格式化手機號碼
document.getElementById('regPhone').addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g, '').slice(0, 10);
    if (v.length > 7) v = v.slice(0,4)+'-'+v.slice(4,7)+'-'+v.slice(7);
    else if (v.length > 4) v = v.slice(0,4)+'-'+v.slice(4);
    e.target.value = v;
});

async function initLiff() {
    let p = new URLSearchParams(window.location.search);
    currentFrom = p.get('from') || 'omp';
    referrerParam = p.get('referrer') || '';
    if(currentFrom === 'so') { document.body.classList.add('theme-so'); document.getElementById('loader').className='loader-icon so'; }
    try {
        await liff.init({ liffId: LIFF_ID });
        if(!liff.isLoggedIn()) { liff.login(); return; }
        userId = (await liff.getProfile()).userId;
        await fetchData();
    } catch(e) { showToast('初始化失敗'); }
}

async function fetchData(isReload=false) {
    try {
        let res = await fetch(`${GAS_URL}?action=checkID&userId=${userId}&from=${currentFrom}&referrerId=${referrerParam}&t=${Date.now()}`);
        userData = await res.json();
        document.getElementById('loading').style.display='none';
        if(userData.isMember) {
            document.getElementById('memberUI').style.display='block';
            document.getElementById('regUI').style.display='none';
            document.getElementById('pointsDisplay').innerText = userData.profile.points;
            document.getElementById('welcomeQuote').innerText = userData.welcomeQuote;
            generateCode();
            if(isReload) showToast('✅ 已更新');
        } else {
            document.getElementById('memberUI').style.display='none';
            document.getElementById('regUI').style.display='block';
        }
    } catch(e) { showToast('讀取失敗'); }
}

function generateCode() {
    let shopCode = userData.shopCode, key = userData.shopKey;
    // 這裡我們把顯示內容包裝成一個帶有 data 參數的網址，原相機掃描會跳轉（雖然沒對應網頁，但不會搜不到）
    // 而店員端會解析這個 data 參數
    let dataStr = `${shopCode}_${key}_${userId}`;
    let scanUrl = `https://liff.line.me/${LIFF_ID}?data=${encodeURIComponent(dataStr)}`;
    
    let bc = document.getElementById('barcodeCanvas'), qr = document.getElementById('qrcode'), btn = document.getElementById('switchCodeBtn');
    document.getElementById('codeText').innerText = dataStr;

    if(isBarcodeMode) {
        bc.style.display='block'; qr.style.display='none'; btn.innerText='🔁 切換至 QR Code';
        JsBarcode(bc, dataStr, { format:"CODE128", width:2.5, height:150, displayValue:false, margin:10 });
    } else {
        bc.style.display='none'; qr.style.display='block'; btn.innerText='🔁 切換至條碼';
        qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(scanUrl)}`;
    }
}

function toggleCodeDisplay() { isBarcodeMode = !isBarcodeMode; generateCode(); }

async function doRegister() {
    let name = document.getElementById('regName').value.trim();
    let phone = document.getElementById('regPhone').value.replace(/-/g,'');
    let birth = document.getElementById('regBirthday').value;
    if(!name || phone.length!==10 || !birth) return showToast('請填寫完整必填欄位');
    if(!document.getElementById('agreeRights').checked || !document.getElementById('agreeLegal').checked) return showToast('請勾選同意條款');
    
    document.getElementById('loading').style.display='flex';
    try {
        let res = await fetch(`${GAS_URL}?action=register&userId=${userId}&name=${encodeURIComponent(name)}&phone=${phone}&birthday=${birth}&referrerId=${referrerParam}&from=${currentFrom}`);
        let r = await res.json();
        if(r.success) { location.reload(); } else { showToast(r.message); document.getElementById('loading').style.display='none'; }
    } catch(e) { showToast('連線失敗'); document.getElementById('loading').style.display='none'; }
}

function openProfile() { closeSideMenu(); let p=userData.profile; openModal(`<h3>👤 個人資料</h3><p>姓名：${p.name}</p><p>電話：${p.phone}</p><p>生日：${p.birthday}</p><p>等級：${p.level}</p><p>註冊分店：${p.branch}</p>`); }
function openReferral() { closeSideMenu(); let h=`<h3>👥 推薦名單</h3><p>我的推薦人：${userData.myReferrer}</p><p>成功推薦：</p>`; userData.myReferrals.length ? userData.myReferrals.forEach(r=>h+=`<div>· ${r.name} (${r.date})</div>`) : h+='<p>尚無推薦紀錄</p>'; openModal(h); }
function openHistory() { closeSideMenu(); let h=`<h3>📜 點數明細</h3><table class="history-table"><tr><th>日期</th><th>本人</th><th>推薦</th><th>折抵</th></tr>`; userData.history.length ? userData.history.forEach(i=>h+=`<tr><td>${i.date}</td><td>${i.gain}</td><td>${i.share}</td><td style="color:#d00">${i.spend}</td></tr>`) : h+='<tr><td colspan="4">尚無紀錄</td></tr>'; h+='</table>'; openModal(h); }
function openEvents(b) { let e = b==='so' ? userData.soEvents : userData.ompEvents; openModal(`<h3>🔥 活動資訊</h3>` + e.map(i=>`<div style="margin-bottom:10px;">· ${i}</div>`).join('')); }
function autoCopyShare() { navigator.clipboard.writeText(`✨ 發現高雄美味 ✨\n點我領券：https://liff.line.me/${LIFF_ID}?from=${currentFrom}&referrer=${userId}`).then(()=>showToast('✅ 推薦碼已複製')).catch(()=>showToast('複製失敗')); }

initLiff();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老娘鍋會員</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto;">
    <h1 style="color:#8b0000;">老娘鍋 x 一點甜</h1>
    <div id="loading" style="text-align:center; padding:40px;">載入中...</div>
    <div id="memberView" style="display:none;">
        <div style="background:#8b0000; color:white; padding:20px; border-radius:12px; text-align:center;">
            <p>目前可用點數</p>
            <h2 id="points">0</h2>
        </div>
        <img id="memberQr" style="width:180px; margin:20px auto; display:block;">
        <button onclick="shareLink()" style="width:100%; padding:14px; background:#06C755; color:white; border:none;">推薦好友</button>
    </div>
    <div id="guestView" style="display:none;">
        <input type="text" id="name" placeholder="真實姓名" style="width:100%; padding:12px; margin:10px 0;">
        <input type="tel" id="phone" placeholder="手機號碼" style="width:100%; padding:12px; margin:10px 0;">
        <input type="date" id="birth" style="width:100%; padding:12px; margin:10px 0;">
        <button id="regBtn" style="width:100%; padding:14px; background:#8b0000; color:white; border:none;">加入會員</button>
    </div>
    <div id="errorView" style="display:none; background:#ffebee; padding:20px; text-align:center;">連線失敗<br><button onclick="location.reload()">重新整理</button></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec";
const LIFF_ID = "2009625010-p9sVIUWe";
let userId = null;
const referrerId = new URLSearchParams(location.search).get('referrerId');

async function init() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        userId = (await liff.getProfile()).userId;
        await checkMember();
    } catch(e) { showError(); }
}

async function checkMember() {
    try {
        let res = await fetch(`${GAS_URL}?action=checkID&userId=${userId}&t=${Date.now()}`);
        let data = await res.json();
        if (data.isMember) showMember(data.userName, data.points);
        else showGuest();
    } catch(e) { showGuest(); }
}

async function register() {
    let name = document.getElementById('name').value.trim();
    let phone = document.getElementById('phone').value.trim();
    let birth = document.getElementById('birth').value;
    if (!name || !phone || !birth) return alert("請填寫完整資料");
    let btn = document.getElementById('regBtn');
    btn.disabled = true; btn.innerText = "處理中...";
    try {
        let url = `${GAS_URL}?action=register&userId=${userId}&name=${encodeURIComponent(name)}&phone=${phone}&birthday=${birth}&referrerId=${referrerId || ""}`;
        let res = await fetch(url);
        let result = await res.text();
        if (result === "SUCCESS") { alert("註冊成功！"); await checkMember(); }
        else if (result === "DUPLICATE") { alert("已是會員！"); await checkMember(); }
        else { alert("註冊失敗"); btn.disabled = false; btn.innerText = "加入會員"; }
    } catch(e) { alert("網路錯誤"); btn.disabled = false; btn.innerText = "加入會員"; }
}

function showMember(name, points) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('guestView').style.display = 'none';
    document.getElementById('memberView').style.display = 'block';
    document.getElementById('points').innerText = points;
    document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${userId}`;
    let nameEl = document.getElementById('welcomeName');
    if (!nameEl) {
        nameEl = document.createElement('p');
        nameEl.id = 'welcomeName';
        nameEl.style.textAlign = 'center';
        nameEl.style.fontWeight = 'bold';
        document.getElementById('memberView').insertBefore(nameEl, document.getElementById('memberView').firstChild);
    }
    nameEl.innerText = `歡迎，${name} 會員`;
}

function showGuest() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('memberView').style.display = 'none';
    document.getElementById('guestView').style.display = 'block';
    let qrData = referrerId || userId;
    if (qrData) document.getElementById('guestQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${qrData}`;
}

function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('guestView').style.display = 'none';
    document.getElementById('memberView').style.display = 'none';
    document.getElementById('errorView').style.display = 'block';
}

function shareLink() {
    navigator.clipboard.writeText(`https://oldmapot.github.io/Member_Master/index.html?referrerId=${userId}`);
    alert("推薦連結已複製！");
}

document.getElementById('regBtn').onclick = register;
document.getElementById('birth').addEventListener('focus', function() { if (!this.value) this.value = "2000-01-01"; });
init();
</script>
</body>
</html>

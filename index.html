<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘的一點心意</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #8b0000; --bg: #fdf5e6; }
        .theme-sweet { --primary: #ff69b4; --bg: #FFF9E6; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 30px; }
        
        /* 1. 進場動畫與隨機文案區 */
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .pot-animation { width: 60px; height: 35px; background: #333; border-radius: 0 0 25px 25px; position: relative; margin: 0 auto; border: 3px solid #222; }
        .pot-animation::after { content: '♨'; position: absolute; top: -30px; left: 12px; font-size: 28px; color: #8b0000; animation: steam 1.2s infinite; }
        .pudding-animation { width: 55px; height: 40px; background: #ffcc00; border-radius: 15px 15px 8px 8px; position: relative; margin: 0 auto; border-top: 12px solid #663300; animation: wobble 0.7s infinite; }
        @keyframes steam { 0% { opacity:0; transform:translateY(0); } 50% { opacity:1; } 100% { opacity:0; transform:translateY(-20px); } }
        @keyframes wobble { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }

        /* 2. 主介面標題 (32px) */
        .header { background: var(--primary); color: white; padding: 45px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .main-title { font-size: 32px; font-weight: 900; margin-top: 10px; letter-spacing: 2px; }
        #welcome-quote { font-size: 15px; font-weight: 500; min-height: 20px; }

        /* 3. 會員資料卡片 (含右側資料與重新整理) */
        .points-card { background: white; margin: -25px 20px 20px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; }
        .points-val { font-size: 42px; font-weight: bold; color: var(--primary); line-height: 1; }
        .refresh-btn { font-size: 12px; color: #999; background: #f8f8f8; border: 1px solid #eee; padding: 4px 10px; border-radius: 12px; cursor: pointer; margin-top: 8px; }
        
        .user-info-right { text-align: right; border-left: 1px solid #eee; padding-left: 15px; }
        .user-name { font-weight: bold; font-size: 16px; color: #333; }
        .user-level { font-size: 12px; color: white; background: var(--primary); padding: 3px 10px; border-radius: 10px; display: inline-block; margin-top: 5px; }

        /* 4. QR Code 與下方註記 */
        .qr-section { text-align: center; margin: 0 20px 20px; padding: 25px; background: white; border-radius: 20px; }
        #qrcode { width: 180px; height: 180px; margin-bottom: 12px; }
        .qr-note { font-size: 14px; color: #666; font-weight: 600; }

        /* 5. 分享按鈕與活動按鈕 */
        .brand-btns-container { display: flex; gap: 12px; padding: 0 20px; margin-bottom: 15px; }
        .brand-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 15px; border: 1.5px solid #ddd; border-radius: 15px; background: white; font-weight: bold; }
        .share-btn { background: #06C755; color: white; border: none; padding: 18px; border-radius: 15px; width: calc(100% - 40px); margin: 0 20px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 12px rgba(6,199,85,0.3); }

        /* 6. 漂亮的分享卡片彈窗 */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display: none; z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-card { background: white; width: 85%; max-width: 350px; border-radius: 25px; overflow: hidden; animation: cardPop 0.3s ease-out; }
        @keyframes cardPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; font-weight: bold; font-size: 20px; }
        .modal-body { padding: 25px; text-align: center; }
        .share-link-box { background: #f4f4f4; padding: 15px; border-radius: 12px; border: 1px dashed #bbb; word-break: break-all; font-size: 14px; color: #444; margin: 15px 0; }
        .close-modal { width: 100%; padding: 18px; border: none; background: #f5f5f5; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading">
    <div style="text-align: center;">
        <div id="loader-icon"></div>
        <div id="loading-text" style="margin-top: 20px; font-weight: bold; color: var(--primary);">正在取出心意...</div>
    </div>
</div>

<div id="memberUI" style="display:none;">
    <div class="header">
        <div id="welcome-quote"></div> <div class="main-title"會員中心</div>
    </div>

    <div class="points-card">
        <div class="points-left">
            <div style="font-size: 13px; color: #666;">可用點數資產</div>
            <div class="points-val" id="points-display">--</div>
            <button class="refresh-btn" onclick="fetchData(myUserId)">🔄 重新整理點數</button>
        </div>
        <div class="user-info-right">
            <div class="user-name" id="user-name">--</div>
            <div class="user-level" id="user-level">--</div>
        </div>
    </div>

    <div class="qr-section">
        <img id="qrcode" src="">
        <div class="qr-note">結帳時請出示此碼，結帳後離櫃或離店都不再補集點</div>
    </div>

    <div class="brand-btns-container">
        <button class="brand-btn" onclick="showEvents('pot')">🔥 <span style="color:#8b0000">老娘精選</span></button>
        <button class="brand-btn" onclick="showEvents('sweet')">🍰 <span style="color:#ff69b4">一點甜好康</span></button>
    </div>

    <button class="share-btn" onclick="showShareCard()">🚀 分享推薦碼給好友</button>
</div>

<div class="modal-overlay" id="commonModal" onclick="this.style.display='none'">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header" id="modalTitle"></div>
        <div class="modal-body" id="modalBody"></div>
        <button class="close-modal" onclick="document.getElementById('commonModal').style.display='none'">我知道了</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec"; 
    const LIFF_ID = "2009625010-p9sVIUWe";
    const urlParams = new URLSearchParams(window.location.search);
    const fromSweet = urlParams.get('from') === 'sweet';
    let myUserId = "";
    let allEvents = { pot: [], sweet: [] };

    function initLoader() {
        const icon = document.getElementById('loader-icon');
        if (fromSweet) {
            document.body.classList.add('theme-sweet');
            icon.className = 'pudding-animation';
        } else {
            icon.className = 'pot-animation';
        }
    }

    async function initLIFF() {
        initLoader();
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        myUserId = profile.userId;
        fetchData(myUserId);
    }

    async function fetchData(userId) {
        try {
            const res = await fetch(`${GAS_URL}?action=checkID&userId=${userId}&from=${fromSweet?'sweet':'pot'}`);
            const data = await res.json();
            if (data.isMember) {
                // 套用隨機文案
                if (data.waitQuote) document.getElementById('loading-text').innerText = data.waitQuote;
                document.getElementById('welcome-quote').innerText = data.welcomeQuote || "歡迎回家";
                
                // 會員資料更新
                document.getElementById('points-display').innerText = data.profile.points;
                document.getElementById('user-name').innerText = data.profile.name;
                document.getElementById('user-level').innerText = data.profile.level;
                document.getElementById('qrcode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${userId}`;
                
                allEvents.pot = data.potEvents || [];
                allEvents.sweet = data.sweetEvents || [];

                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('memberUI').style.display = 'block';
                }, 1000);
            }
        } catch(e) { console.error(e); }
    }

    // 漂亮的分享卡片
    function showShareCard() {
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        const shareLink = `https://liff.line.me/${LIFF_ID}?referrer=${myUserId}`;
        
        title.innerText = "🚀 您的專屬推薦碼";
        title.style.color = "#06C755";
        body.innerHTML = `
            <p style="font-weight:bold; color:#333;">邀請好友註冊，好禮領不完！</p>
            <p style="font-size:13px; color:#666;">長按下方連結即可複製，傳送給好友完成註冊，您即可獲得推薦點數：</p>
            <div class="share-link-box">${shareLink}</div>
            <p style="font-size:11px; color:#999;">(建議直接轉發此連結給 LINE 好友)</p>
        `;
        document.getElementById('commonModal').style.display = 'flex';
    }

    // 品牌活動彈窗
    function showEvents(type) {
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        const events = type === 'pot' ? allEvents.pot : allEvents.sweet;
        
        title.innerText = type === 'pot' ? "🔥 老娘精選活動" : "🍰 一點甜專屬好康";
        title.style.color = type === 'pot' ? "#8b0000" : "#ff69b4";
        body.innerHTML = events.length > 0 
            ? events.map(e => `<div style="text-align:left; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">✨ ${e}</div>`).join('')
            : "目前暫無活動，敬請期待！";
        
        document.getElementById('commonModal').style.display = 'flex';
    }

    initLIFF();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘的一點心意</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
        :root { 
            --primary: #8b0000;      /* 老娘鍋主色 */
            --bg: #fdf5e6;           /* 頁面背景 */
            --card-bg: #fff; 
            --text: #333; 
            --light-text: #666; 
            --action-btn: #beb1a8;   /* 右側功能按鈕顏色 */
            --brand-btn: #ab545a;    /* 品牌優惠按鈕顏色 */
            --success: #06C755;      /* LINE 分享顏色 */
        }
        
        /* 一點甜主題顏色切換 */
        .theme-sw { --primary: #b57c82; --bg: #FFF9E6; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding-bottom: 40px; color: var(--text); }
        
        /* 載入動畫與隨機文案區 */
        #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 20px; }
        .loader-icon { width: 60px; height: 35px; background: #333; border-radius: 0 0 25px 25px; position: relative; border: 3px solid #222; }
        .loader-icon.om::after { content: '♨'; position: absolute; top: -30px; left: 12px; font-size: 28px; color: var(--primary); animation: steam 1.2s infinite; }
        .loader-icon.sw { width: 55px; height: 40px; background: #ffcc00; border-radius: 15px 15px 8px 8px; border-top: 10px solid #663300; animation: wobble 0.7s infinite; }
        @keyframes steam { 0%{opacity:0;transform:translateY(0)}50%{opacity:1}100%{opacity:0;transform:translateY(-20px)} }
        @keyframes wobble { 0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)} }
        
        /* 標頭樣式 */
        .header { background: var(--primary); color: #fff; padding: 45px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .welcome-quote { font-size: 18px; opacity: 0.95; margin-bottom: 8px; }
        .main-title { font-size: 32px; font-weight: 900; }
        
        /* 點數資產卡片 */
        .points-card { background: var(--card-bg); margin: -25px 20px 20px; padding: 28px 24px; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .points-left { flex: 1; text-align: center; }
        .points-value { font-size: 48px; font-weight: 900; color: var(--primary); line-height: 1.1; }
        .refresh-btn { margin-top: 12px; padding: 8px 16px; border-radius: 12px; background: #f7f7f7; border: 1px solid #eee; font-size: 14px; color: var(--light-text); cursor: pointer; }
        
        .action-group-right { display: flex; flex-direction: column; gap: 10px; width: 140px; }
        .action-btn { padding: 12px; border-radius: 16px; background: var(--action-btn); border: none; font-size: 15px; font-weight: bold; color: #fff; cursor: pointer; }
        
        /* QR Code 顯示區塊 */
        .qr-section { background: var(--card-bg); margin:0 20px 20px; padding:28px; border-radius:20px; text-align:center; }
        #qrcode { width:180px; height:180px; margin-bottom:12px; }
        
        /* 品牌按鈕與分享按鈕 */
        .brand-actions { display: flex; gap: 10px; margin: 0 20px 20px; }
        .event-brand-btn { flex: 1; padding: 15px; border-radius: 16px; background: var(--brand-btn); color: #fff; font-weight: bold; font-size: 16px; border: none; cursor: pointer; }
        .share-btn { display: block; width: calc(100% - 40px); margin: 0 auto; padding: 18px; border-radius: 20px; background: var(--success); color: #fff; font-weight: bold; font-size: 18px; border:none; cursor: pointer; }

        /* 註冊介面 */
        #regUI { display:none; padding:40px 24px; }
        .reg-input { width:100%; padding:16px; border-radius:14px; border:1px solid #ddd; font-size:16px; box-sizing:border-box; margin-top:10px; }
        .reg-btn { width:100%; padding:18px; background:var(--primary); color:#fff; border:none; border-radius:16px; font-weight:bold; margin-top:30px; cursor:pointer; }
        .reg-qr-tip { background:#fff; padding:20px; border-radius:16px; text-align:center; margin-bottom:20px; border:2px dashed var(--primary); }

        /* 彈出式 Modal */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:3000; }
        .modal-card { background:var(--card-bg); width:92%; max-width:420px; border-radius:24px; overflow:hidden; }
        .modal-body { padding:24px; max-height: 65vh; overflow-y: auto; }
        
        /* 點數明細表格分散對齊 */
        .history-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 10px; }
        .history-table th, .history-table td { padding: 12px 2px; text-align: center; font-size: 12px; border-bottom: 1px solid #eee; }
        .history-table th { color: #888; font-weight: bold; background: #fafafa; }

        /* 漂亮卡片專用樣式 (註冊成功 & 分享) */
        .welcome-card { background: linear-gradient(135deg, #8b0000, #ff69b4); color: #fff; padding: 30px 24px; border-radius: 24px; text-align: center; }
        .share-modal-content { text-align: center; padding: 10px; }
        .share-title { font-size: 22px; color: var(--primary); font-weight: 900; margin-bottom: 15px; }
        .share-body { font-size: 16px; line-height: 1.8; color: #555; }
        .share-highlight { color: #ab545a; font-weight: bold; display: block; font-size: 18px; margin: 5px 0; }

        .toast { position:fixed; left:50%; bottom:60px; transform:translateX(-50%); background:rgba(0,0,0,0.75); color:#fff; padding:12px 20px; border-radius:12px; z-index:9999; display:none; }
        
        /* 註冊表單錯誤提示 */
        .error-hint { color: #d32f2f; font-size: 12px; margin-top: 4px; display: block; }
        input.error { border-color: #d32f2f; background-color: #fff8f8; }
    </style>
</head>
<body>

<div id="loading">
    <div id="loader" class="loader-icon omp"></div>
    <div id="loading-text" style="font-weight: bold; color: var(--primary); font-size: 16px; text-align:center; padding:0 20px;"></div>
</div>

<div id="memberUI" style="display:none">
    <div class="header">
        <div class="welcome-quote" id="welcomeQuote"></div>
        <div class="main-title">老娘的一點心意</div>
    </div>
    <div class="points-card">
        <div class="points-left">
            <div style="font-size:14px; color:#666;">可用點數資產</div>
            <div class="points-value" id="pointsDisplay">--</div>
            <button class="refresh-btn" onclick="fetchData(true)">🔄 重新整理</button>
        </div>
        <div class="action-group-right">
            <button class="action-btn" onclick="openProfile()">👤 個人資料</button>
            <button class="action-btn" onclick="openReferral()">👥 推薦名單</button>
            <button class="action-btn" onclick="openHistory()">📜 點數明細</button>
        </div>
    </div>

    <div class="qr-section">
        <img id="qrcode" src="">
        <div style="font-size:14px; color:#666; font-weight:600;">結帳時請出示此碼，結帳後離開櫃台恕不補集點</div>
    </div>

    <div class="brand-actions">
        <button class="event-brand-btn" onclick="openEvents('omp')">老娘精選</button>
        <button class="event-brand-btn" onclick="openEvents('so')">一點甜好康</button>
    </div>
    <button class="share-btn" onclick="autoCopyShare()">🚀 分享推薦碼，享好友消費回饋</button>
</div>

<div id="regUI">
    <div id="regGiftArea" class="reg-qr-tip" style="display:none;">
        <div id="giftTitle" style="color:var(--primary); font-weight:bold; margin-bottom:10px; font-size: 18px;"></div>
        <img id="regGiftQR" src="" style="width:160px; height:160px; margin-bottom:8px;">
        <div style="font-size:12px; color:#8b0000;">請先出示此碼給店員掃描領取招待<br>領完後記得完成下方註冊喔！</div>
    </div>

    <h2 style="text-align:center; color:var(--primary); margin-bottom: 20px;" id="regTitleText">新會員註冊</h2>
    
    <div style="margin-bottom: 20px;">
        <input id="regName" class="reg-input" placeholder="姓名 *">
        <span id="nameError" class="error-hint"></span>
    </div>
    
    <div style="margin-bottom: 20px;">
        <input id="regPhone" class="reg-input" placeholder="手機 09XX-XXX-XXX *" maxlength="13">
        <span id="phoneError" class="error-hint"></span>
    </div>
    
    <div style="margin-bottom: 20px; padding: 0 5px;">
        <label style="display:block; font-weight:bold; color:var(--primary); margin-bottom: 5px;">🎂 生日 *</label>
        <input type="date" id="regBirthday" class="reg-input" style="margin-top:0;">
        <span id="birthdayError" class="error-hint"></span>
        <div style="font-size:12px; color:#ab545a; margin-top: 8px; line-height: 1.4; background: #fff1f1; padding: 10px; border-radius: 10px; border: 1px solid #ffebeb;">
            ⚠️ 註記：享生日專屬優惠，註冊後不可修改。
        </div>
    </div>

    <button class="reg-btn" onclick="validateAndRegister()" style="margin-top: 25px;">完成註冊</button>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div id="modalBody" class="modal-body"></div>
        <button style="width:100%; padding:18px; border:none; background:#eee; font-weight:bold; color:#666;" onclick="closeModal()">關閉</button>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
const TEXTS = {
    omp: ["老娘正在翻帳本，幫你算驚喜...", "老娘正在準備你的心意...", "火鍋滾了，心意也快好了...", "湯頭正在滾，心意馬上到..."],
    so: ["正在為你的生活，加入一點甜...", "遇見你，就是一點甜...", "捕捉今日份的甜，請稍候片刻...", "心意準備中，等等來點甜的吧！"]
};

const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec";
const LIFF_ID = "2009625010-p9sVIUWe";
let userId = '', userData = null, currentFrom = 'omp', referrerParam = '';

function showToast(msg){
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    setTimeout(()=>{ t.style.display = 'none'; }, 2000);
}

// 清除所有錯誤提示
function clearErrors() {
    document.getElementById('nameError').innerText = '';
    document.getElementById('phoneError').innerText = '';
    document.getElementById('birthdayError').innerText = '';
    document.getElementById('regName').classList.remove('error');
    document.getElementById('regPhone').classList.remove('error');
    document.getElementById('regBirthday').classList.remove('error');
}

// 驗證表單
function validateForm() {
    clearErrors();
    let isValid = true;
    
    const name = document.getElementById('regName').value.trim();
    if (!name) {
        document.getElementById('nameError').innerText = '請填寫姓名';
        document.getElementById('regName').classList.add('error');
        isValid = false;
    } else if (name.length < 2) {
        document.getElementById('nameError').innerText = '姓名至少2個字';
        document.getElementById('regName').classList.add('error');
        isValid = false;
    }
    
    const phoneRaw = document.getElementById('regPhone').value.trim();
    const phoneNum = phoneRaw.replace(/-/g, '');
    if (!phoneRaw) {
        document.getElementById('phoneError').innerText = '請填寫手機號碼';
        document.getElementById('regPhone').classList.add('error');
        isValid = false;
    } else if (!/^09\d{8}$/.test(phoneNum)) {
        document.getElementById('phoneError').innerText = '請輸入正確的手機號碼 (09開頭，共10碼)';
        document.getElementById('regPhone').classList.add('error');
        isValid = false;
    }
    
    const birthday = document.getElementById('regBirthday').value;
    if (!birthday) {
        document.getElementById('birthdayError').innerText = '請選擇生日';
        document.getElementById('regBirthday').classList.add('error');
        isValid = false;
    } else {
        const birthDate = new Date(birthday);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
        if (age < 12) {
            document.getElementById('birthdayError').innerText = '年齡需滿12歲以上';
            document.getElementById('regBirthday').classList.add('error');
            isValid = false;
        } else if (age > 120) {
            document.getElementById('birthdayError').innerText = '請輸入有效的生日';
            document.getElementById('regBirthday').classList.add('error');
            isValid = false;
        }
    }
    
    return isValid;
}

// 手機號碼自動格式化
document.getElementById('regPhone').addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g, '').slice(0, 10);
    if (v.length >= 4) {
        v = v.slice(0, 4) + '-' + v.slice(4);
    }
    if (v.length >= 8) {
        v = v.slice(0, 8) + '-' + v.slice(8);
    }
    e.target.value = v;
    if (document.getElementById('phoneError').innerText) {
        document.getElementById('phoneError').innerText = '';
        e.target.classList.remove('error');
    }
}); 

document.getElementById('regName').addEventListener('input', function(e) {
    if (document.getElementById('nameError').innerText) {
        document.getElementById('nameError').innerText = '';
        e.target.classList.remove('error');
    }
});

document.getElementById('regBirthday').addEventListener('change', function(e) {
    if (document.getElementById('birthdayError').innerText) {
        document.getElementById('birthdayError').innerText = '';
        e.target.classList.remove('error');
    }
});

async function initLiff() {
    const params = new URLSearchParams(window.location.search);
    currentFrom = params.get('from') || 'omp';
    referrerParam = params.get('referrer') || '';
    
    const pool = TEXTS[currentFrom] || TEXTS.omp;
    document.getElementById('loading-text').innerText = pool[Math.floor(Math.random() * pool.length)];

    if(currentFrom === 'so') {
        document.body.classList.add('theme-sw');
        document.getElementById('loader').className = 'loader-icon sw';
        document.getElementById('loading-text').style.color = '#b57c82';
    }
    try {
        await liff.init({ liffId: LIFF_ID });
        if(!liff.isLoggedIn()) { liff.login(); return; }
        const p = await liff.getProfile();
        userId = p.userId;
        fetchData();
    } catch(e) { 
        console.error("LIFF初始化錯誤", e);
        showToast('LIFF 初始化失敗'); 
        document.getElementById('loading').style.display = 'none';
    }
}

async function fetchData(isReload = false) {
    try {
        const url = `${GAS_URL}?action=checkID&userId=${userId}&from=${currentFrom}&referrerId=${encodeURIComponent(referrerParam)}&t=${Date.now()}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        userData = await res.json();
        
        // 使用後端回傳的文句池文案更新載入畫面
        if(userData.loadingTexts && userData.loadingTexts.length > 0) {
            const randomText = userData.loadingTexts[Math.floor(Math.random() * userData.loadingTexts.length)];
            document.getElementById('loading-text').innerText = randomText;
        } else {
            const pool = TEXTS[currentFrom] || TEXTS.omp;
            document.getElementById('loading-text').innerText = pool[Math.floor(Math.random() * pool.length)];
        }
        
        document.getElementById('loading').style.display = 'none';
        
        if(!userData.isMember) {
            document.getElementById('regUI').style.display = 'block';
            if(referrerParam && referrerParam !== 'undefined' && referrerParam !== '') {
                document.getElementById('regGiftArea').style.display = 'block';
                const referrerName = (userData.myReferrer && userData.myReferrer !== "無") ? userData.myReferrer : "神祕好友";
                document.getElementById('giftTitle').innerHTML = `🎁 你的好友 ${referrerName} 送你的專屬好禮`;
                const giftData = `GIFT_BY_${referrerParam}`;
                document.getElementById('regGiftQR').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(giftData)}`;
            }
        } else {
            document.getElementById('memberUI').style.display = 'block';
            document.getElementById('regUI').style.display = 'none';
            document.getElementById('pointsDisplay').innerText = userData.profile.points || 0;
            document.getElementById('welcomeQuote').innerText = userData.welcomeQuote || "歡迎回來！";
            document.getElementById('qrcode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(userId)}`;
            if(isReload) showToast('✅ 資料已更新');
        }
    } catch(err) {
        console.error("Fetch 錯誤:", err);
        showToast('資料載入失敗，請稍後再試');
        document.getElementById('loading').style.display = 'none';
    }
}

// 驗證後註冊
async function validateAndRegister() {
    if (!validateForm()) {
        return;
    }
    await doRegister();
}

async function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim().replace(/-/g, '');
    const birthday = document.getElementById('regBirthday').value;
    
    // 顯示載入畫面
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('regUI').style.display = 'none';
    
    // 使用後端回傳的 loadingTexts 或預設文案
    if(userData && userData.loadingTexts && userData.loadingTexts.length > 0) {
        const randomText = userData.loadingTexts[Math.floor(Math.random() * userData.loadingTexts.length)];
        document.getElementById('loading-text').innerText = randomText;
    } else {
        const pool = TEXTS[currentFrom] || TEXTS.omp;
        document.getElementById('loading-text').innerText = pool[Math.floor(Math.random() * pool.length)];
    }
    
    // 設定動畫樣式
    if(currentFrom === 'so') {
        document.getElementById('loader').className = 'loader-icon sw';
    } else {
        document.getElementById('loader').className = 'loader-icon omp';
    }

    // 使用 POST 方法發送註冊請求
    const postData = {
        action: "register",
        userId: userId,
        name: name,
        phone: phone,
        birthday: birthday,
        referrerId: referrerParam || "",
        from: currentFrom
    };
    
    try {
        const res = await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // 使用 no-cors 模式避免 CORS 問題
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(postData)
        });
        
        // 由於 no-cors 模式無法讀取回應內容，改用 GET 方式確認註冊狀態
        // 等待 2 秒讓後端處理完成
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        // 重新檢查會員狀態
        const checkUrl = `${GAS_URL}?action=checkID&userId=${userId}&from=${currentFrom}&referrerId=${encodeURIComponent(referrerParam)}&t=${Date.now()}`;
        const checkRes = await fetch(checkUrl);
        const checkResult = await checkRes.json();
        
        if(checkResult.isMember) {
            // 註冊成功
            document.getElementById('loading').style.display = 'none';
            openModal(`
                <div class="welcome-card">
                    <h2>🎉 註冊成功！</h2>
                    <p>歡迎加入老娘的一點心意🍲🍰<br>
                    <br>
                    這是老娘留給你的偏心。<br>
                    日子不一定天天完美，但一定要有一點甜 💕</p>
                    <div style="margin-top: 20px; font-size: 14px;">3秒後自動進入會員頁面...</div>
                </div>
            `);
            setTimeout(() => { 
                closeModal();
                location.reload(); 
            }, 3000);
        } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('regUI').style.display = 'block';
            showToast('註冊失敗，請稍後再試或聯絡客服');
        }
    } catch(e) { 
        console.error("註冊錯誤:", e);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('regUI').style.display = 'block';
        showToast('網路連線錯誤，請確認網路後再試');
    }
}

function openEvents(brand) {
    const title = brand === 'so' ? '一點甜好康' : '老娘精選';
    const events = brand === 'so' 
        ? (userData?.soEvents || [])
        : (userData?.ompEvents || []);
    
    let html = `<h3 style="color:var(--primary); text-align:center; margin-bottom:20px;">🔥 ${title}</h3>`;
    
    html += events.length > 0 
        ? events.map(e => `<div style="padding:15px 0; border-bottom:1px solid #f0f0f0; line-height:1.5;">✨ ${e}</div>`).join('')
        : '<p style="text-align:center; color:#999;">目前暫無活動</p>';
    
    openModal(html);
}

function openReferral() {
    let html = `<h3 style="color:var(--primary); text-align:center;">👥 推薦名單</h3>
    <div style="margin-bottom:15px; padding-bottom:12px; border-bottom:2px solid #eee;">
        <b>推薦您的好友是：</b><span style="color:var(--primary); margin-left:8px;">${userData?.myReferrer || "無"}</span>
    </div>
    <div style="font-weight:bold; margin-bottom:10px; color:#555;">您推薦的好友：</div>`;
    if(userData?.myReferrals && userData.myReferrals.length > 0) {
        html += userData.myReferrals.map((r, i) => `
            <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f0f0f0; font-size:14px;">
                <span>${i+1}. ${r.name}</span>
                <span style="color:#999; font-size:12px;">加入日期：${r.date}</span>
            </div>
        `).join('');
    } else {
        html += `<div style="text-align:center; color:#999; padding:20px;">尚無好友加入</div>`;
    }
    openModal(html);
}

function openHistory() {
    let html = `<h3 style="color:var(--primary); text-align:center;">📜 點數明細</h3>
    <table class="history-table">
        <thead>
              <tr>
                <th style="width:16%">日期</th>
                <th>本人獲取點</th>
                <th>推薦回饋點</th>
                <th>當日折抵</th>
              </tr>
        </thead>
        <tbody>`;
    let totalExpiredSoon = 0;
    if(userData?.history && userData.history.length > 0) {
        html += userData.history.map(h => {
            const expiredValue = (h.expired && h.expired !== 'undefined' && h.expired !== null) ? h.expired : '';
            const expiredNum = Number(h.expired) || 0;
            totalExpiredSoon += expiredNum;
            
            return `<tr>
                <td>${h.date}</td>
                <td>${h.gain || ''}</td>
                <td>${h.share || ''}</td>
                <td style="color:#d00; font-weight:bold;">${h.spend || ''}</td>
            </tr>`;
        }).join('');
    } else {
        html += `<tr><td colspan="4" style="padding:20px; color:#999;">目前尚無紀錄</td></tr>`;
    }
    html += `</tbody>
    </table>
    <div style="margin-top: 20px; padding: 15px; background: #fff5f5; border-radius: 12px; border: 1px dashed #ab545a; text-align: center;">
        <div style="font-size: 14px; color: #666;">⏳ 即將過期點數 (近期)</div>
        <div style="font-size: 24px; font-weight: 900; color: #d00; margin-top: 5px;">${totalExpiredSoon} <span style="font-size: 14px;">點</span></div>
        <div style="font-size: 11px; color: #999; margin-top: 5px;">* 點數寶貴，記得趕快來店內折抵唷！ *</div>
    </div>`;
    openModal(html);
}

function autoCopyShare() {

function openModal(html) { 
    document.getElementById('modalBody').innerHTML = html; 
    document.getElementById('modal').style.display = 'flex'; 
}
function closeModal() {

}

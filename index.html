<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘鍋 x 一點甜</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main-red: #8b0000; --line-green: #06C755; --bg-cream: #fdf5e6; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: var(--bg-cream); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 380px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--main-red); text-align: center; box-sizing: border-box; }
        
        /* 標題與基礎文字 */
        h2 { color: var(--main-red); margin: 0 0 5px 0; }
        .info-list { text-align: left; font-size: 15px; color: #444; line-height: 1.7; background: #f9f9f9; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #eee; }

        /* 表單優化 */
        .form-group { text-align: left; margin-top: 15px; }
        label.input-label { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 8px; display: block; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--main-red); outline: none; }
        
        /* 勾選區 */
        .check-group { font-size: 14px; color: #555; margin: 15px 0; display: flex; align-items: flex-start; text-align: left; }
        .check-group input { width: 20px; height: 20px; margin-right: 12px; flex-shrink: 0; }
        .check-link { color: var(--main-red); font-weight: bold; text-decoration: underline; cursor: pointer; }

        /* 按鈕 */
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .btn-reg { background: var(--main-red); color: white; margin-top: 10px; }
        .btn-reg:disabled { background: #ccc; }

        /* 自定義彈窗 (解決網址標題問題) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-height: 70%; border-radius: 20px; padding: 25px; overflow-y: auto; position: relative; text-align: left; }
        .modal-header { font-size: 18px; font-weight: bold; color: var(--main-red); margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .modal-body { font-size: 15px; color: #444; line-height: 1.8; white-space: pre-wrap; }
        .modal-close { display: block; width: 100%; background: #eee; color: #333; padding: 12px; border-radius: 10px; text-align: center; margin-top: 20px; font-weight: bold; text-decoration: none; }

        /* Toast */
        #toast { visibility: hidden; min-width: 250px; background: rgba(0,0,0,0.85); color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 3000; bottom: 50px; left: 50%; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 50px; opacity: 1;} }
    </style>
</head>
<body>

    <div id="termsModal" class="modal">
        <div class="modal-content">
            <div id="modalTitle" class="modal-header"></div>
            <div id="modalBody" class="modal-body"></div>
            <a href="javascript:void(0)" class="modal-close" onclick="closeModal()">我已閱讀並了解</a>
        </div>
    </div>

    <div id="toast">✅ 專屬推薦碼已複製！</div>

    <div class="card">
        <h2>老娘鍋 x 一點甜</h2>
        
        <div id="ui-loading" style="padding:40px;"><p>同步中...</p></div>

        <div id="ui-guest" style="display:none;">
            <div class="info-list" style="background:#fff5f5;">
                🎁 <strong>好友專屬招待禮</strong><br>
                加入會員並出示 QR Code，即老娘鍋消費享小菜或一點甜消費享霜淇淋一支。<br>
                本優惠碼限兌換一次。
            </div>
            
            <div class="form-group">
                <label class="input-label">真實姓名</label>
                <input type="text" id="regName" placeholder="範例：王小明">
                
                <label class="input-label">手機號碼</label>
                <input type="tel" id="regPhone" placeholder="0912345678">
                
                <label class="input-label">生日 (領取壽星優惠)</label>
                <input type="date" id="regBirth">

                <label class="check-group">
                    <input type="checkbox" id="checkRights">
                    <span>同意 <a class="check-link" onclick="openModal('rights')">會員權益與點數規則</a></span>
                </label>

                <label class="check-group">
                    <input type="checkbox" id="checkLegal">
                    <span>同意 <a class="check-link" onclick="openModal('legal')">法務免責與防弊聲明</a></span>
                </label>

                <button class="btn-reg" id="regBtn" onclick="submitForm()">立即加入會員</button>
            </div>
        </div>

        <div id="ui-member" style="display:none;">
            <p id="userNameDisplay"></p>
            <div id="memberQrArea">
                <img id="memberQr" style="width:180px; height:180px;">
            </div>
            <div class="point-badge">
                <p style="margin:0; font-size:14px; opacity:0.8;">目前可用點數</p>
                <h1 id="userPoints" style="margin:5px 0;">0 pt</h1>
            </div>
            <div class="info-list">
                • 點數價值：$1 點 = NT$1 元<br>
                • 本人消費：<strong>5% 點數回饋</strong><br>
                • 推薦好友：<strong>2% 點數回饋</strong>
            </div>
            <button style="background:var(--line-green); color:white;" onclick="handleShare()">推薦好友領招待</button>
        </div>
    </div>

<script>
    // 生議預設 2000 年邏輯
    const birthInput = document.getElementById('regBirth');
    birthInput.addEventListener('focus', function() {
        if (!this.value) {
            this.value = "2000-01-01";
        }
    });

    // 條款內容資料
    const content = {
        rights: {
            title: "會員權益與點數規則",
            text: "◆ 點數價值：$1 點 = NT$1 元。\n◆ 本人集點：實付金額之 5% (效期12個月)。\n◆ 朋友回饋：好友消費實付之 2% (效期6個月)。\n◆ 生效時間：採隔日生效制。\n◆ 購買餐券：提撥 3% 點數。\n◆ 使用餐券：扣除面額後之實付額提撥 5%。\n◆ 特殊日期：春節、母親節等檔期暫停折抵。\n◆ 特殊活動：本人集點 3%，朋友回饋 1%。"
        },
        legal: {
            title: "法務免責與防弊聲明",
            text: "◆ 非現金化：點數不可兌換現金或轉讓。\n◆ 終止權：店家保有修改或終止活動之權利。\n◆ 營運調整：因不可抗力因素點數失效時不得要求賠償。\n◆ 誠信監測：偵測異常集點或虛假推薦將凍結帳號。\n◆ 最終解釋權：本公司保有活動最終解釋權。"
        }
    };

    function openModal(type) {
        document.getElementById('modalTitle').innerText = content[type].title;
        document.getElementById('modalBody').innerText = content[type].text;
        document.getElementById('termsModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('termsModal').style.display = 'none';
    }

    // --- 以下為原有的 LIFF 與 API 邏輯 ---
    const gasUrl = "https://script.google.com/macros/s/AKfycbwwXAPVNQ-CJ3MfcxBebxtthvHGwrK9YTXGS_a5yqL2Ss7JAF1jJoAFSHOHWx-AdhT-Cw/exec";
    let myId = "";
    
    async function initLIFF() {
        await liff.init({ liffId: "2009625010-p9sVIUWe" });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        myId = profile.userId;
        fetchData();
    }
    initLIFF();

    function fetchData() {
        fetch(`${gasUrl}?action=checkID&userId=${myId}`)
        .then(res => res.json())
        .then(res => {
            document.getElementById('ui-loading').style.display = 'none';
            if (res.isMember) showMemberUI(res);
            else document.getElementById('ui-guest').style.display = 'block';
        });
    }

    function showMemberUI(res) {
        document.getElementById('ui-member').style.display = 'block';
        document.getElementById('userNameDisplay').innerText = `您好，${res.userName}`;
        document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${myId}`;
        document.getElementById('userPoints').innerText = `${res.points} pt`;
    }

    async function submitForm() {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        const birth = document.getElementById('regBirth').value;
        if(!name || !phone || !birth) { alert("請填寫完整資料"); return; }
        if(!document.getElementById('checkRights').checked || !document.getElementById('checkLegal').checked) {
            alert("請勾選同意條款"); return;
        }
        
        document.getElementById('regBtn').disabled = true;
        fetch(gasUrl, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "register", name, phone, birthday: birth, userId: myId }) });
        setTimeout(() => { alert("註冊成功！"); location.reload(); }, 1500);
    }
</script>
</body>
</html>

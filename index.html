<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘鍋 x 一點甜｜數位會員</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main-red: #8b0000; --line-green: #06C755; --bg-cream: #fdf5e6; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: var(--bg-cream); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 380px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--main-red); text-align: center; box-sizing: border-box; min-height: 520px; }
        
        /* 載入動畫 */
        .loading-box { padding-top: 80px; color: #999; }
        .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top: 3px solid var(--main-red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { color: var(--main-red); margin: 0 0 5px 0; }
        .qr-box img { width: 180px; height: 180px; border: 1px solid #eee; padding: 5px; }
        .point-badge { background: var(--main-red); color: white; padding: 15px; border-radius: 15px; margin: 15px 0; }
        
        /* 權益說明列表 */
        .info-list { text-align: left; font-size: 13px; color: #444; line-height: 1.6; background: #f9f9f9; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #eee; }
        .info-list strong { color: var(--main-red); }

        /* 表單與勾選 */
        .form-group { text-align: left; margin-top: 15px; }
        label.input-label { font-size: 13px; font-weight: bold; color: #444; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .check-group { font-size: 12px; color: #555; margin: 12px 0; display: flex; align-items: flex-start; line-height: 1.5; }
        .check-group input { width: 18px; height: 18px; margin-right: 10px; flex-shrink: 0; }
        .check-link { color: var(--main-red); font-weight: bold; text-decoration: underline; cursor: pointer; }

        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-reg { background: var(--main-red); color: white; }
        .btn-share { background: var(--line-green); color: white; margin-top: 10px; }
        
        #ui-member, #ui-guest { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>老娘鍋 x 一點甜</h2>
        
        <div id="ui-loading" class="loading-box"><div class="spinner"></div>同步系統資料中...</div>

        <div id="ui-member">
            <p id="userNameDisplay" style="color:#666; font-size:14px;"></p>
            <div class="qr-box">
                <img id="memberQr" src="">
                <p style="font-size:12px; color:var(--main-red); font-weight:bold; margin-top:8px;">結帳請出示此碼集點</p>
            </div>
            <div class="point-badge">
                <p style="margin:0; font-size:13px; opacity:0.8;">目前可用點數</p>
                <h1 id="userPoints" style="margin:5px 0;">0 pt</h1>
            </div>
            <div class="info-list">
                • 點數價值：$1 點 = NT$1 元<br>
                • 專屬回饋：本人消費享 <strong>5% 回饋點數</strong><br>
                • 推薦回饋：享好友消費 <strong>2% 回饋點數</strong>
            </div>
            <button class="btn-share" onclick="handleShare()">推薦好友領招待</button>
        </div>

        <div id="ui-guest">
            <div style="background:#fff5f5; border:2px dashed var(--main-red); padding:15px; border-radius:15px;">
                <p style="margin:0; font-weight:bold; color:var(--main-red);">🎁 好友專屬招待禮</p>
                <div class="qr-box" style="margin:10px 0;"><img id="guestQr" src=""></div>
                <p style="font-size:12px; color:#444;">出示此碼，享小菜或甜點一份</p>
            </div>
            
            <div class="form-group">
                <label class="input-label">真實姓名</label>
                <input type="text" id="regName" placeholder="請填寫姓名">
                <label class="input-label">手機號碼</label>
                <input type="tel" id="regPhone" placeholder="09xxxxxxxx">
                <label class="input-label">生日 (領取壽星優惠)</label>
                <input type="date" id="regBirth" value="2000-01-01">

                <label class="check-group">
                    <input type="checkbox" id="checkRights">
                    <span>我已閱讀並同意 <span class="check-link" onclick="showRights()">【會員權益與點數規則】</span></span>
                </label>
                <label class="check-group">
                    <input type="checkbox" id="checkLegal">
                    <span>我已同意 <span class="check-link" onclick="showLegal()">【法務免責聲明與防弊控管】</span></span>
                </label>

                <button class="btn-reg" id="regBtn" onclick="register()">立即加入會員並領取招待</button>
            </div>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec";
    const LIFF_ID = "2009625010-p9sVIUWe";
    let myId = "";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            myId = profile.userId;
            checkMember();
        } catch (e) { console.error(e); }
    }

    async function checkMember() {
        try {
            const res = await fetch(`${GAS_URL}?action=checkID&userId=${myId}`, { redirect: 'follow' });
            const data = await res.json();
            document.getElementById('ui-loading').style.display = 'none';
            if (data.isMember) {
                document.getElementById('ui-member').style.display = 'block';
                document.getElementById('ui-guest').style.display = 'none';
                document.getElementById('userNameDisplay').innerText = `您好，${data.userName} 會員`;
                document.getElementById('userPoints').innerText = `${data.points} pt`;
                document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${myId}`;
            } else {
                showGuestUI();
            }
        } catch (e) { showGuestUI(); }
    }

    function showGuestUI() {
        document.getElementById('ui-loading').style.display = 'none';
        document.getElementById('ui-member').style.display = 'none';
        document.getElementById('ui-guest').style.display = 'block';
        const urlParams = new URLSearchParams(window.location.search);
        const rid = urlParams.get('referrerId') || myId;
        document.getElementById('guestQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${rid}`;
    }

    async function register() {
        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const birth = document.getElementById('regBirth').value;
        const c1 = document.getElementById('checkRights').checked;
        const c2 = document.getElementById('checkLegal').checked;

        if (!name || !phone || !birth) { alert("請填寫完整資料"); return; }
        if (!c1 || !c2) { alert("請勾選並同意條款"); return; }

        document.getElementById('regBtn').disabled = true;
        document.getElementById('regBtn').innerText = "同步中...";

        try {
            const rid = new URLSearchParams(window.location.search).get('referrerId') || "";
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ action: "register", name, phone, birthday: birth, userId: myId, referrerId: rid })
            });
            alert("註冊成功！歡迎加入老娘鍋家族！");
            setTimeout(checkMember, 2000);
        } catch (e) { alert("註冊失敗，請重試"); document.getElementById('regBtn').disabled = false; }
    }

    function handleShare() {
        const shareUrl = `https://oldmapot.github.io/Member_Master/index.html?referrerId=${myId}`;
        if (liff.isApiAvailable('shareTargetPicker')) {
            liff.shareTargetPicker([{
                "type": "flex",
                "altText": "🎁 你的好友送你老娘鍋招待禮！",
                "contents": {
                    "type": "bubble",
                    "hero": { "type": "image", "url": "https://images.unsplash.com/photo-1590671886400-8f8088b97cb0?q=80&w=1000&auto=format&fit=crop", "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                    "body": { "type": "box", "layout": "vertical", "contents": [
                        {"type": "text", "text": "老娘鍋 x 一點甜", "weight": "bold", "color": "#8b0000", "size": "sm"},
                        {"type": "text", "text": "好友專屬招待禮 🍲", "weight": "bold", "size": "xl", "margin": "md"},
                        {"type": "text", "text": "出示此碼即享招待禮，本人集點 5%，推薦好友集點 2%！", "wrap": true, "size": "xs", "margin": "md", "color": "#666666"}
                    ]},
                    "footer": { "type": "box", "layout": "vertical", "contents": [
                        { "type": "button", "action": { "type": "uri", "label": "立即領取回饋", "uri": shareUrl }, "style": "primary", "color": "#8b0000" }
                    ]}
                }
            }]).then(() => { console.log("Share sent"); }).catch(err => {
                const el = document.createElement('textarea'); el.value = shareUrl; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                alert("推薦連結已複製！");
            });
        }
    }

    function showRights() { alert("【點數規則】\n1. $1點 = NT$1元。\n2. 本人消費享 5% 回饋。\n3. 推薦好友享其消費 2% 回饋。"); }
    function showLegal() { alert("【法務聲明】\n1. 點數不可兌現。\n2. 若偵測異常推薦，店家有權凍結帳號。"); }

    init();
</script>
</body>
</html>

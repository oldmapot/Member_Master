<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘鍋 x 一點甜｜專屬好禮</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main-red: #8b0000; --line-green: #06C755; }
        body { font-family: -apple-system, sans-serif; background-color: #fdf5e6; margin: 0; padding: 20px 0; display: flex; justify-content: center; }
        .card { width: 90%; max-width: 380px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--main-red); text-align: center; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#fdf5e6; display:flex; justify-content:center; align-items:center; z-index:999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid var(--main-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        h2 { color: var(--main-red); margin: 0 0 10px 0; }
        .welcome-msg { font-size: 15px; color: #444; margin-bottom: 20px; line-height: 1.5; }
        
        /* 註冊區塊優化 */
        .reg-box { background: #fff5f5; padding: 15px; border-radius: 15px; border: 1px dashed var(--main-red); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* QR Code 區塊 */
        .qr-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .qr-box img { width: 180px; height: 180px; border: 1px solid #eee; padding: 5px; background: #fff; }
        
        .point-badge { background: var(--main-red); color: white; padding: 20px; border-radius: 15px; margin: 20px 0; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-reg { background: var(--main-red); color: white; }
        .btn-share { background: var(--line-green); color: white; }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay"><div class="spinner"></div></div>

    <div class="card" id="mainCard" style="display:none;">
        <h2 id="cardTitle">老娘鍋 x 一點甜</h2>
        
        <div id="memberUI" style="display:none;">
            <p id="userNameDisplay" style="color:#666;"></p>
            <div class="qr-section">
                <img id="memberQr" src="" alt="集點碼">
                <p style="font-size:12px; color:var(--main-red); font-weight:bold;">結帳請出示此碼集點</p>
            </div>
            <div class="point-badge">
                <p style="margin:0; font-size:13px; opacity:0.8;">可用點數</p>
                <h1 id="userPoints">0 <span style="font-size:14px;">pt</span></h1>
            </div>
            <button class="btn-share" onclick="shareToFriend()">推薦好友領招待</button>
        </div>

        <div id="guestUI" style="display:none;">
            <div class="welcome-msg">
                <strong>您的好友送您一份見面禮！</strong><br>
                在老娘鍋享受暖心火鍋，或在一點甜品味手作 Gelato，註冊即享專屬優惠。
            </div>

            <div class="reg-box">
                <p style="margin-top:0; font-weight:bold; color:var(--main-red);">🎁 領取專屬招待禮</p>
                <input type="text" id="name" placeholder="您的稱呼">
                <input type="tel" id="phone" placeholder="電話 (點數紀錄用)">
                <button class="btn-reg" id="regBtn" onclick="submitForm()">加入會員並領取</button>
            </div>

            <div class="qr-section">
                <p style="font-size:13px; color:#666;">若您人已在店內，可直接出示此碼：</p>
                <img id="guestQr" src="" alt="招待碼">
                <p style="font-size:12px; color:var(--main-red); font-weight:bold;">店員掃描即享招待禮</p>
            </div>
        </div>

        <button style="background:#eee; color:#666; font-size:14px;" onclick="liff.closeWindow()">返回 LINE</button>
    </div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbwwXAPVNQ-CJ3MfcxBebxtthvHGwrK9YTXGS_a5yqL2Ss7JAF1jJoAFSHOHWx-AdhT-Cw/exec";
    let myId = "";
    const urlParams = new URLSearchParams(window.location.search);
    const referrerId = urlParams.get('referrerId');

    async function initLIFF() {
        try {
            await liff.init({ liffId: "2009625010-p9sVIUWe" });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            myId = profile.userId;
            checkStatus();
        } catch (e) { console.error(e); }
    }
    initLIFF();

    function checkStatus() {
        fetch(`${gasUrl}?action=checkID&userId=${myId}`)
        .then(res => res.json())
        .then(res => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainCard').style.display = 'block';
            if (res.isMember) {
                showMemberUI(res);
            } else {
                showGuestUI();
            }
        });
    }

    function showMemberUI(res) {
        document.getElementById('memberUI').style.display = 'block';
        document.getElementById('userNameDisplay').innerText = `${res.userName} 的行動會員卡`;
        document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${myId}`;
        document.getElementById('userPoints').innerHTML = `${res.points} <span style="font-size:14px;">pt</span>`;
    }

    function showGuestUI() {
        document.getElementById('guestUI').style.display = 'block';
        // 優先顯示推薦人的碼，若無則顯示自己的（作為臨時紀錄）
        const displayId = referrerId || myId;
        document.getElementById('guestQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${displayId}`;
    }

    async function submitForm() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if(!name || !phone) { alert("請填寫姓名與電話"); return; }
        
        const btn = document.getElementById('regBtn');
        btn.disabled = true; btn.innerText = "處理中...";

        fetch(gasUrl, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify({ action: "register", name, phone, userId: myId, referrerId: referrerId || "" }) 
        });
        
        setTimeout(() => {
            alert("註冊成功！歡迎來到老娘鍋 x 一點甜！");
            location.reload();
        }, 1500);
    }

    function shareToFriend() {
        const shareUrl = `https://oldmapot.github.io/Member_Master/index.html?referrerId=${myId}`;
        if (liff.isApiAvailable('shareTargetPicker')) {
            liff.shareTargetPicker([{
                "type": "flex",
                "altText": "🎁 送你老娘鍋專屬招待禮！",
                "contents": {
                    "type": "bubble",
                    "hero": { "type": "image", "url": "https://images.unsplash.com/photo-1590671886400-8f8088b97cb0?q=80&w=1000&auto=format&fit=crop", "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                    "body": { "type": "box", "layout": "vertical", "contents": [
                        {"type": "text", "text": "老娘鍋 x 一點甜", "weight": "bold", "color": "#8b0000", "size": "sm"},
                        {"type": "text", "text": "好友專屬招待禮 🍲", "weight": "bold", "size": "xl", "margin": "md"},
                        {"type": "text", "text": "透過連結領取招待禮，結帳出示 QR Code 即可使用！", "wrap": true, "size": "xs", "margin": "md", "color": "#666666"}
                    ]},
                    "footer": { "type": "box", "layout": "vertical", "contents": [
                        { "type": "button", "action": { "type": "uri", "label": "立即領取回饋", "uri": shareUrl }, "style": "primary", "color": "#8b0000" }
                    ]}
                }
            }]);
        }
    }
</script>
</body>
</html>

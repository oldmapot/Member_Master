<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘的一點心意</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #8b0000; --bg: #fdf5e6; }
        .theme-sw { --primary: #ff69b4; --bg: #FFF9E6; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding-bottom: 40px; }

        #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .loader-icon { width: 60px; height: 35px; background: #333; border-radius: 0 0 25px 25px; position: relative; border: 3px solid #222; }
        .loader-icon.om::after { content: '♨'; position: absolute; top: -30px; left: 12px; font-size: 28px; color: #8b0000; animation: steam 1.2s infinite; }
        .loader-icon.sw { width: 55px; height: 40px; background: #ffcc00; border-radius: 15px 15px 8px 8px; border-top: 10px solid #663300; animation: wobble 0.7s infinite; }
        @keyframes steam { 0%{opacity:0;transform:translateY(0)}50%{opacity:1}100%{opacity:0;transform:translateY(-20px)} }
        @keyframes wobble { 0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)} }

        .header { background: var(--primary); color: #fff; padding: 45px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .welcome-quote { font-size: 14px; opacity: 0.9; margin-bottom: 6px; }
        .main-title { font-size: 32px; font-weight: 900; }

        /* 點數卡片 + 右側功能區（你要的核心！） */
        .points-card {
            background: #fff;
            margin: -25px 20px 20px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .points-left { flex-shrink: 0; text-align: left; }
        .points-label { font-size: 12px; color: #666; margin-bottom: 4px; }
        .points-value { font-size: 42px; font-weight: 900; color: var(--primary); line-height: 1.1; }
        .refresh-btn {
            margin-top: 10px;
            padding: 5px 10px;
            border-radius: 10px;
            background: #f7f7f7;
            border: 1px solid #eee;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 右側功能按鈕區（你要的 3 個按鈕在這！） */
        .action-group-right {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 140px;
        }
        .action-btn {
            padding: 10px 12px;
            border-radius: 12px;
            background: #f9f9f9;
            border: 1px solid #eee;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
        }

        .qr-section { background:#fff; margin:0 20px 20px; padding:26px; border-radius:20px; text-align:center; }
        #qrcode { width:180px; height:180px; margin-bottom:12px; }
        .qr-note { font-size:14px; color:#666; font-weight:600; line-height:1.4; }

        .share-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 0 auto;
            padding: 18px;
            border-radius: 16px;
            background: #06C755;
            color: #fff;
            font-weight: bold;
            font-size: 17px;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:3000 }
        .modal-card { background:#fff;width:92%;max-width:400px;border-radius:24px;overflow:hidden }
        .modal-header { padding:18px;font-weight:bold;border-bottom:1px solid #eee;font-size:17px }
        .modal-body { padding:20px;max-height:70vh;overflow-y:auto }
        .close-btn { width:100%;padding:18px;background:#f5f5f5;border:none;font-weight:bold;color:#555 }

        .toast { position:fixed;left:50%;bottom:60px;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:12px 20px;border-radius:12px;z-index:9999;display:none;white-space:nowrap }

        table { width:100%;border-collapse:collapse;font-size:13px }
        th { background:#f8f8f8;padding:10px;border-bottom:2px solid #eee }
        td { padding:10px 6px;border-bottom:1px solid #f0f0f0;text-align:center }
    </style>
</head>
<body>

<div id="loading">
    <div style="text-align:center">
        <div id="loader" class="loader-icon om"></div>
        <div style="margin-top:20px;font-weight:bold;color:var(--primary)">正在取出心意...</div>
    </div>
</div>

<div id="memberUI" style="display:none">
    <div class="header">
        <div class="welcome-quote" id="welcomeQuote"></div>
        <div class="main-title">老娘的一點心意</div>
    </div>

    <!-- 點數卡片 + 右側 3 個功能按鈕（你要的！） -->
    <div class="points-card">
        <div class="points-left">
            <div class="points-label">可用點數資產</div>
            <div class="points-value" id="pointsDisplay">--</div>
            <button class="refresh-btn" onclick="fetchData(true)">🔄 重新整理</button>
        </div>

        <!-- 右側功能區（1個人資料 / 2推薦名單 / 3點數明細） -->
        <div class="action-group-right">
            <button class="action-btn" onclick="openProfile()">👤 個人資料</button>
            <button class="action-btn" onclick="openReferral()">👥 推薦名單</button>
            <button class="action-btn" onclick="openHistory()">📜 點數明細</button>
        </div>
    </div>

    <div class="qr-section">
        <img id="qrcode" src="">
        <div class="qr-note">結帳時請出示此碼，結帳後離櫃恕不再累積點數</div>
    </div>

    <button class="share-btn" onclick="copyShare()">🚀 分享推薦碼</button>
</div>

<!-- 註冊頁 -->
<div id="regUI" style="display:none;padding:40px 24px">
    <h2 style="color:var(--primary);font-weight:900;text-align:center">會員註冊</h2>
    <div style="margin-top:30px">
        <div style="font-size:12px;color:#888;margin-bottom:6px">姓名</div>
        <input id="regName" style="width:100%;padding:16px;border-radius:14px;border:1px solid #ddd;font-size:16px" placeholder="請輸入姓名">
    </div>
    <div style="margin-top:16px">
        <div style="font-size:12px;color:#888;margin-bottom:6px">手機</div>
        <input id="regPhone" style="width:100%;padding:16px;border-radius:14px;border:1px solid #ddd;font-size:16px" placeholder="09XX-XXX-XXX">
    </div>
    <div style="margin-top:16px">
        <div style="font-size:12px;color:#888;margin-bottom:6px">生日（無法修改）</div>
        <input type="date" id="regBirthday" style="width:100%;padding:16px;border-radius:14px;border:1px solid #ddd;font-size:16px">
    </div>
    <button onclick="doRegister()" style="width:100%;padding:18px;background:var(--primary);color:#fff;border:none;border-radius:16px;font-weight:bold;font-size:17px;margin-top:30px">完成註冊</button>
</div>

<!-- 彈窗 -->
<div class="modal-overlay" id="modal" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header" id="modalTitle"></div>
        <div class="modal-body" id="modalBody"></div>
        <button class="close-btn" onclick="closeModal()">關閉</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec";
const LIFF_ID = "2009625010-p9sVIUWe";
const params = new URLSearchParams(location.search);
const from = params.get('from') || 'om';
const ref = params.get('referrer') || '';
let userId = '';
let user = {};

if(from === 'so') document.body.classList.add('theme-sw');

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none',2200);
}

async function init(){
  const loader = document.getElementById('loader');
  loader.className = from === 'so' ? 'loader-icon sw' : 'loader-icon om';
  await liff.init({liffId:LIFF_ID});
  if(!liff.isLoggedIn()) return liff.login();
  const p = await liff.getProfile();
  userId = p.userId;
  fetchData();
}

async function fetchData(showToast=false){
  try{
    const res = await fetch(GAS+`?action=checkID&userId=${userId}&from=${from}`);
    user = await res.json();
    if(!user.isMember){
      document.getElementById('loading').style.display='none';
      document.getElementById('regUI').style.display='block';
      return;
    }
    document.getElementById('pointsDisplay').textContent = user.profile.points;
    document.getElementById('welcomeQuote').textContent = user.welcomeQuote || '歡迎回來！';
    document.getElementById('qrcode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${userId}`;
    document.getElementById('loading').style.display='none';
    document.getElementById('memberUI').style.display='block';
    if(showToast) toast('✅ 資料已更新');
  }catch(e){ toast('❌ 載入失敗'); }
}

// 1. 個人資料（生日不可修改）
function openProfile(){
  document.getElementById('modalTitle').innerText = '👤 個人資料';
  document.getElementById('modalBody').innerHTML = `
    <div style="line-height:2.2;font-size:15px">
      <div><b>姓名：</b>${user.profile.name}</div>
      <div><b>手機：</b>${user.profile.phone}</div>
      <div><b>生日：</b>${user.profile.birthday} <span style="color:red">(無法修改)</span></div>
      <div><b>分店：</b>${user.profile.branch}</div>
      <div><b>等級：</b>${user.profile.level}</div>
    </div>`;
  document.getElementById('modal').style.display='flex';
}

// 2. 推薦名單（我的推薦人 + 我推薦的人）
function openReferral(){
  document.getElementById('modalTitle').innerText = '👥 推薦名單';
  let list = user.myReferrals?.length ? user.myReferrals.map(i=>`
    <div style="padding:12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between">
      <span>${i.name}</span><span style="color:#888">${i.date}</span>
    </div>`).join('') : '<div style="padding:20px;color:#999;text-align:center">無</div>';
  document.getElementById('modalBody').innerHTML = `
    <div style="padding:12px;background:#f9f9f9;border-radius:12px;margin-bottom:16px">
      <b>我的推薦人：</b> ${user.myReferrer || '無'}
    </div>
    <div><b>我推薦的人：</b></div>${list}`;
  document.getElementById('modal').style.display='flex';
}

// 3. 點數明細（你指定欄位）
function openHistory(){
  document.getElementById('modalTitle').innerText = '📜 點數明細';
  let rows = user.history?.length ? user.history.map(h=>`
    <tr>
      <td>${h.date}</td>
      <td>${h.gain}</td>
      <td>${h.share || 0}</td>
      <td>${h.spend || 0}</td>
      <td>${h.balance}</td>
    </tr>`).join('') : '<tr><td colspan="5">無紀錄</td></tr>';
  document.getElementById('modalBody').innerHTML = `
    <table>
      <tr>
        <th>日期</th>
        <th>獲取</th>
        <th>分享</th>
        <th>折抵</th>
        <th>剩餘</th>
      </tr>
      ${rows}
    </table>`;
  document.getElementById('modal').style.display='flex';
}

function closeModal(){ document.getElementById('modal').style.display='none'; }

async function doRegister(){
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.replace(/\D/g,'');
  const birth = document.getElementById('regBirthday').value;
  if(!name || phone.length!==10 || !birth) return toast('請填寫完整');
  const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'register',userId,name,phone,birthday:birth,referrerId:ref,from})});
  const r = await res.json();
  r.success ? (toast('✅ 註冊成功'),fetchData()) : toast(r.message);
}

function copyShare(){
  const link = `https://liff.line.me/${LIFF_ID}?from=${from}&referrer=${userId}`;
  navigator.clipboard.writeText(link).then(()=>toast('✅ 推薦連結已複製'));
}

init();
</script>
</body>
</html>

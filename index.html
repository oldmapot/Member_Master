<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老娘鍋會員</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto;">
    <h1 style="color:#8b0000;">老娘鍋 x 一點甜</h1>
    
    <div id="loading" style="text-align:center; padding:40px;">
        <div>載入中...</div>
        <div id="debugMsg" style="font-size:12px; color:#666; margin-top:20px;"></div>
    </div>
    
    <div id="memberPanel" style="display:none;">
        <div style="background:#8b0000; color:white; padding:20px; border-radius:12px; text-align:center;">
            <p>目前可用點數</p>
            <h2 id="points" style="font-size:40px; margin:10px 0;">0</h2>
            <p>pt</p>
        </div>
        <div style="text-align:center; margin:20px 0;">
            <img id="memberQr" style="width:180px; background:white; padding:10px; border-radius:12px;">
        </div>
        <button onclick="share()" style="width:100%; padding:14px; background:#06C755; color:white; border:none; border-radius:12px; font-size:16px;">推薦好友</button>
    </div>
    
    <div id="guestPanel" style="display:none;">
        <div style="background:#fff5f0; padding:15px; border-radius:12px; margin-bottom:20px;">
            🎁 好友專屬招待禮
        </div>
        <div style="text-align:center; margin:20px 0;">
            <img id="guestQr" style="width:180px; background:white; padding:10px; border-radius:12px;">
        </div>
        <input type="text" id="name" placeholder="真實姓名" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <input type="tel" id="phone" placeholder="手機號碼" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <input type="date" id="birth" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <button id="regBtn" onclick="register()" style="width:100%; padding:14px; background:#8b0000; color:white; border:none; border-radius:12px; font-size:16px;">加入會員</button>
    </div>
    
    <div id="errorPanel" style="display:none; background:#ffebee; padding:20px; border-radius:12px; text-align:center;">
        <p id="errorMsg">連線失敗</p>
        <button onclick="location.reload()" style="margin-top:10px; padding:10px 20px;">重新整理</button>
    </div>

<script>
// ========== 請貼上您新部署的 GAS 網址 ==========
const GAS_URL = "https://script.google.com/macros/s/AKfycbwuMlqWFj3RH0_34JsmOmz4CTyJyJ8hE5UQIgKoEnO4B12aEZoeItu-RHlRByKp115n6A/exec";
// =============================================

const LIFF_ID = "2009625010-p9sVIUWe";

let userId = null;
const urlParams = new URLSearchParams(window.location.search);
const referrerId = urlParams.get('referrerId');

function setDebugMsg(msg) {
    const el = document.getElementById('debugMsg');
    if (el) el.innerText = msg;
    console.log(msg);
}

async function init() {
    setDebugMsg("初始化中...");
    try {
        await liff.init({ liffId: LIFF_ID });
        setDebugMsg("LIFF 初始化成功");
        
        if (!liff.isLoggedIn()) {
            setDebugMsg("未登入，跳轉中");
            liff.login();
            return;
        }
        
        const profile = await liff.getProfile();
        userId = profile.userId;
        setDebugMsg("使用者: " + profile.displayName);
        
        await checkMember();
        
    } catch(e) {
        setDebugMsg("錯誤: " + e.message);
        showError(e.message);
    }
}

async function checkMember() {
    showLoading();
    
    try {
        const url = `${GAS_URL}?action=checkID&userId=${userId}&t=${Date.now()}`;
        setDebugMsg("檢查會員...");
        
        const res = await fetch(url);
        const data = await res.json();
        
        if (data.isMember === true) {
            showMember(data.userName, data.points);
        } else {
            showGuest();
        }
    } catch(e) {
        setDebugMsg("檢查失敗: " + e.message);
        showError(e.message);
    }
}

async function register() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const birth = document.getElementById('birth').value;
    
    if (!name || !phone || !birth) {
        alert("請填寫完整資料");
        return;
    }
    
    const btn = document.getElementById('regBtn');
    btn.disabled = true;
    btn.innerText = "處理中...";
    setDebugMsg("註冊中...");
    
    try {
        // 使用 GET 方式測試 POST 是否正常（臨時測試用）
        const testUrl = `${GAS_URL}?action=checkID&userId=test`;
        const testRes = await fetch(testUrl);
        setDebugMsg("GET 測試成功");
        
        // 正式 POST 註冊
        const response = await fetch(GAS_URL, {
            method: "POST",
            mode: "cors",
            headers: { 
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                action: "register",
                name: name,
                phone: phone,
                birthday: birth,
                userId: userId,
                referrerId: referrerId || ""
            })
        });
        
        const result = await response.text();
        setDebugMsg("回應: " + result);
        
        if (result === "SUCCESS") {
            alert("🎉 註冊成功！");
            await checkMember();
        } else if (result === "DUPLICATE") {
            alert("您已經是會員了！");
            await checkMember();
        } else {
            alert("註冊失敗：" + result);
            btn.disabled = false;
            btn.innerText = "加入會員";
        }
        
    } catch(e) {
        setDebugMsg("錯誤: " + e.message);
        alert("網路錯誤：" + e.message + "\n請稍後再試");
        btn.disabled = false;
        btn.innerText = "加入會員";
    }
}

function share() {
    const url = `https://oldmapot.github.io/Member_Master/index.html?referrerId=${userId}`;
    navigator.clipboard.writeText(url);
    alert("推薦連結已複製！");
}

function showLoading() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('memberPanel').style.display = 'none';
    document.getElementById('guestPanel').style.display = 'none';
    document.getElementById('errorPanel').style.display = 'none';
}

function showMember(name, points) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('memberPanel').style.display = 'block';
    document.getElementById('guestPanel').style.display = 'none';
    document.getElementById('errorPanel').style.display = 'none';
    
    document.getElementById('points').innerText = points;
    document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${userId}`;
    
    let nameEl = document.querySelector('#memberPanel .welcome-name');
    if (!nameEl) {
        nameEl = document.createElement('p');
        nameEl.className = 'welcome-name';
        nameEl.style.textAlign = 'center';
        nameEl.style.fontWeight = 'bold';
        nameEl.style.margin = '10px 0';
        document.getElementById('memberPanel').insertBefore(nameEl, document.getElementById('memberPanel').firstChild);
    }
    nameEl.innerText = `歡迎，${name} 會員`;
}

function showGuest() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('memberPanel').style.display = 'none';
    document.getElementById('guestPanel').style.display = 'block';
    document.getElementById('errorPanel').style.display = 'none';
    
    const qrData = referrerId || userId;
    if (qrData) {
        document.getElementById('guestQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${qrData}`;
    }
}

function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('memberPanel').style.display = 'none';
    document.getElementById('guestPanel').style.display = 'none';
    document.getElementById('errorPanel').style.display = 'block';
    document.getElementById('errorMsg').innerHTML = msg || '連線失敗<br><br>請確認網路連線後重新整理';
}

// 設定生日預設值
const birthInput = document.getElementById('birth');
if (birthInput) {
    birthInput.addEventListener('focus', function() {
        if (!this.value) this.value = "2000-01-01";
    });
}

init();
</script>
</body>
</html>

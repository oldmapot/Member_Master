<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老娘鍋會員註冊</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: #fdf5e6; display: flex; justify-content: center; min-height: 100vh; }
        .card { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); align-self: center; }
        h2 { color: #8b0000; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #8b0000; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="card" id="formBox">
        <h2>老娘鍋 x 一點甜</h2>
        <input type="text" id="name" placeholder="請輸入姓名">
        <input type="tel" id="phone" placeholder="請輸入手機號碼">
        <input type="date" id="birthday">
        <button id="submitBtn" onclick="submitForm()">確認註冊</button>
    </div>

<script>
    let userId = "";
    const gasUrl = "https://script.google.com/macros/s/AKfycbwwXAPVNQ-CJ3MfcxBebxtthvHGwrK9YTXGS_a5yqL2Ss7JAF1jJoAFSHOHWx-AdhT-Cw/exec"; 

    async function initLIFF() {
        try {
            await liff.init({ liffId: "2009625010-p9sVIUWe" }); 
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                userId = profile.userId;
                checkMembership(userId);
            } else {
                liff.login();
            }
        } catch (e) { console.error("LIFF 失敗", e); }
    }
    initLIFF();

    function checkMembership(id) {
        fetch(gasUrl + "?action=checkID&userId=" + id)
        .then(res => res.json())
        .then(res => {
            if (res.isMember) {
                showSuccess("歡迎回來！", "您已經是老娘鍋的會員囉。");
            }
        })
        .catch(err => console.log("準備註冊新會員"));
    }

    async function submitForm() {
        const btn = document.getElementById('submitBtn');
        const data = {
            action: "register", // 👈 加上這一行，讓 GAS 知道現在是註冊
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            birthday: document.getElementById('birthday').value,
            userId: userId
        };

        if(!data.name || !data.phone || !userId) {
            alert("請填寫完整資料"); return;
        }

        btn.disabled = true;
        btn.innerText = "正在為您綁定...";

        // 送出資料
        fetch(gasUrl, {
            method: "POST",
            mode: "no-cors", 
            body: JSON.stringify(data)
        });

        // 彈出提示並關閉
        setTimeout(() => {
            alert("註冊動作已送出！請回試算表確認。");
            liff.closeWindow();
        }, 1200);
    }

    function showSuccess(title, msg) {
        document.body.innerHTML = `
            <div style="text-align:center; padding:50px; background-color:#fdf5e6; height:100vh; display:flex; flex-direction:column; justify-content:center;">
                <h2 style="color:#8b0000;">${title}</h2>
                <p>${msg}</p>
                <button onclick="liff.closeWindow()" style="padding:15px 30px; background:#8b0000; color:white; border:none; border-radius:8px; font-size:16px; width:200px; margin:20px auto;">返回 LINE</button>
            </div>`;
    }
</script>
</body>
</html>

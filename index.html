<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加入會員｜老娘的一點心意</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #8b0000; --bg: #fdf5e6; }
        .theme-sweet { --primary: #FFB7D5; --bg: #FFF9E6; }
        .theme-pot { --primary: #8b0000; --bg: #fdf5e6; }

        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; transition: 0.3s; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; background: var(--primary); color: white; margin-top: 10px; }
        button:disabled { background: #ccc; }

        #loading { display: none; text-align: center; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body class="theme-pot"> <div class="container">
    <h2 id="title">加入老娘鍋會員</h2>
    
    <div id="regForm">
        <div class="form-group">
            <label>真實姓名</label>
            <input type="text" id="name" placeholder="請輸入姓名">
        </div>
        <div class="form-group">
            <label>手機號碼</label>
            <input type="tel" id="phone" placeholder="09XX-XXX-XXX">
        </div>
        <div class="form-group">
            <label>生日</label>
            <input type="date" id="birthday">
        </div>
        <button id="submitBtn" onclick="register()">立即註冊領取招待禮</button>
    </div>

    <div id="loading">處理中，請稍候...</div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec"; // ⚠️ 請貼上你的 GAS 部署網址
    const LIFF_ID = "2009625010-p9sVIUWe";
    let myId = "";

    // 1. 初始化並處理主題
    async function init() {
        const params = new URLSearchParams(window.location.search);
        const from = params.get('from') || 'pot';
        
        if (from === 'sweet') {
            document.body.className = 'theme-sweet';
            document.getElementById('title').innerText = '加入一點甜會員';
        }

        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            myId = profile.userId;
        } catch (e) { alert("LIFF 初始化失敗"); }
    }

    // 2. 註冊邏輯
    async function register() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const birthday = document.getElementById('birthday').value;
        const params = new URLSearchParams(window.location.search);
        const rid = params.get('referrerId') || "";

        if (!name || !phone || !birthday) { alert("請填寫完整資料喔！"); return; }

        document.getElementById('regForm').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "register",
                    userId: myId,
                    name: name,
                    phone: phone,
                    birthday: birthday,
                    referrerId: rid
                })
            });
            const result = await res.json();
            if (result.success) {
                alert("註冊成功！歡迎加入！");
                // 註冊完跳回會員中心，帶回原本的主題參數
                window.location.href = "index.html?from=" + (params.get('from') || 'pot');
            } else {
                alert("註冊失敗：" + result.message);
                document.getElementById('regForm').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        } catch (e) {
            alert("系統錯誤，請稍後再試");
        }
    }

    init();
</script>
</body>
</html>

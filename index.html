<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘鍋 x 一點甜｜會員中心</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main-red: #8b0000; --line-green: #06C755; --bg-cream: #fdf5e6; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-cream); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 380px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--main-red); text-align: center; box-sizing: border-box; min-height: 520px; }
        h2 { color: var(--main-red); margin: 0 0 15px 0; }
        .loading-box { padding-top: 100px; color: #666; }
        .qr-box img { width: 180px; height: 180px; border: 1px solid #eee; padding: 5px; background: #fff; }
        .point-badge { background: var(--main-red); color: white; padding: 15px; border-radius: 15px; margin: 15px 0; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-reg { background: var(--main-red); color: white; }
        .btn-share { background: var(--line-green); color: white; }
        #ui-member, #ui-guest { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>老娘鍋 x 一點甜</h2>
        
        <div id="ui-loading" class="loading-box">
            <p>🔄 系統資料同步中...</p>
        </div>

        <div id="ui-member">
            <p id="userNameDisplay" style="font-weight:bold;"></p>
            <div class="qr-box"><img id="memberQr" src=""></div>
            <div class="point-badge">
                <p style="margin:0; font-size:14px; opacity:0.9;">目前可用點數</p>
                <h1 id="userPoints" style="margin:5px 0;">0 pt</h1>
            </div>
            <button class="btn-share" onclick="handleShare()">推薦好友領招待</button>
        </div>

        <div id="ui-guest">
            <p style="color:var(--main-red); font-weight:bold;">🎁 新好友專屬招待</p>
            <div class="qr-box"><img id="guestQr" src=""></div>
            <div style="margin-top:20px; text-align:left;">
                <input type="text" id="regName" placeholder="真實姓名">
                <input type="tel" id="regPhone" placeholder="手機號碼">
                <input type="date" id="regBirth" value="2000-01-01">
                <button class="btn-reg" id="regBtn" onclick="register()">立即加入會員</button>
            </div>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec";
    const LIFF_ID = "2009625010-p9sVIUWe";
    let myId = "";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            myId = profile.userId;
            checkMember();
        } catch (e) { console.error(e); }
    }

    async function checkMember() {
        try {
            // 強制加上 redirect: 'follow' 解決轉圈圈
            const res = await fetch(`${GAS_URL}?action=checkID&userId=${myId}`, { redirect: 'follow' });
            const data = await res.json();
            
            document.getElementById('ui-loading').style.display = 'none';
            if (data.isMember) {
                document.getElementById('ui-member').style.display = 'block';
                document.getElementById('ui-guest').style.display = 'none';
                document.getElementById('userNameDisplay').innerText = `歡迎，${data.userName} 會員`;
                document.getElementById('userPoints').innerText = `${data.points} pt`;
                document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${myId}`;
            } else {
                showGuestUI();
            }
        } catch (e) { showGuestUI(); }
    }

    function showGuestUI() {
        document.getElementById('ui-loading').style.display = 'none';
        document.getElementById('ui-member').style.display = 'none';
        document.getElementById('ui-guest').style.display = 'block';
        const urlParams = new URLSearchParams(window.location.search);
        const rid = urlParams.get('referrerId') || myId;
        document.getElementById('guestQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${rid}`;
    }

    async function register() {
        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const birth = document.getElementById('regBirth').value;
        if (!name || !phone) { alert("請填寫姓名與電話"); return; }

        document.getElementById('regBtn').disabled = true;
        document.getElementById('regBtn').innerText = "處理中...";

        try {
            const urlParams = new URLSearchParams(window.location.search);
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    action: "register",
                    name: name,
                    phone: phone,
                    birthday: birth,
                    userId: myId,
                    referrerId: urlParams.get('referrerId') || ""
                })
            });
            alert("註冊成功！");
            setTimeout(checkMember, 2000); // 留兩秒寫入資料後刷新
        } catch (e) { alert("連線失敗，請稍後再試"); }
    }

    function handleShare() {
        const shareUrl = `https://oldmapot.github.io/Member_Master/index.html?referrerId=${myId}`;
        const el = document.createElement('textarea');
        el.value = `🍲 老娘鍋 x 一點甜 🍲\n送你專屬招待券，加入會員再領回饋點數！\n點我領取：${shareUrl}`;
        document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        alert("推薦連結已複製！");
    }

    init();
</script>
</body>
</html>

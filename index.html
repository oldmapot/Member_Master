<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘鍋 x 一點甜</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main-red: #8b0000; --line-green: #06C755; --bg-cream: #fdf5e6; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-cream); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 380px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--main-red); text-align: center; box-sizing: border-box; min-height: 520px; }
        /* 初始狀態：除了載入中，全部強制隱藏 */
        #ui-guest, #ui-member { display: none !important; }
        h2 { color: var(--main-red); margin: 0 0 15px 0; }
        .qr-box img { width: 180px; height: 180px; border: 1px solid #eee; padding: 5px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .btn-reg { background: var(--main-red); color: white; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>老娘鍋 x 一點甜</h2>
        
        <div id="ui-loading" style="padding-top:100px;">
            <div style="width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid var(--main-red); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div>
            <p>正在確認會員身分...</p>
        </div>

        <div id="ui-guest">
            <p style="color:red; font-weight:bold;">🎁 好友專屬招待禮</p>
            <div class="qr-box"><img id="guestQr" src=""></div>
            <div style="text-align:left; margin-top:15px;">
                <input type="text" id="regName" placeholder="真實姓名">
                <input type="tel" id="regPhone" placeholder="手機號碼">
                <input type="date" id="regBirth" value="2000-01-01">
                <button class="btn-reg" id="regBtn" onclick="submitForm()">加入會員領取招待</button>
            </div>
        </div>

        <div id="ui-member">
            <p id="userNameDisplay" style="font-weight:bold;"></p>
            <div class="qr-box"><img id="memberQr" src=""></div>
            <div style="background:var(--main-red); color:white; padding:15px; border-radius:15px; margin:15px 0;">
                <p style="margin:0; font-size:14px;">可用點數</p>
                <h1 id="userPoints">0 pt</h1>
            </div>
            <button style="background:var(--line-green); color:white;" onclick="handleShare()">推薦好友領招待</button>
        </div>
    </div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycby1YCNUjtY3ZoTLJmeN86Y1UMBKXFJFcvWkdBupwnwByEWCtzVHjp09A6_3twyCepTBPg/exec";
    const liffId = "2009625010-p9sVIUWe";
    let myId = "";

    async function initLIFF() {
        try {
            await liff.init({ liffId: liffId });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            myId = profile.userId;
            
            // 拿到 ID 後才去抓資料
            fetchData();
        } catch (e) {
            alert("LINE 初始化失敗，請重新開啟");
        }
    }
    initLIFF();

    function fetchData() {
        const url = `${gasUrl}?action=checkID&userId=${myId}`;
        fetch(url, { redirect: 'follow' })
        .then(res => res.json())
        .then(res => {
            document.getElementById('ui-loading').style.display = 'none';
            if (res && res.isMember) {
                // 是會員：打開會員頁，確保訪客頁關閉
                document.getElementById('ui-member').style.setProperty('display', 'block', 'important');
                document.getElementById('ui-guest').style.setProperty('display', 'none', 'important');
                
                document.getElementById('userNameDisplay').innerText = `歡迎，${res.userName} 會員`;
                document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${myId}`;
                document.getElementById('userPoints').innerText = `${res.points} pt`;
            } else {
                // 非會員：打開訪客頁，確保會員頁關閉
                showGuestUI();
            }
        })
        .catch(() => showGuestUI());
    }

    function showGuestUI() {
        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('referrerId');
        
        document.getElementById('ui-loading').style.display = 'none';
        document.getElementById('ui-member').style.setProperty('display', 'none', 'important');
        document.getElementById('ui-guest').style.setProperty('display', 'block', 'important');
        
        const qrData = referrerId || myId;
        document.getElementById('guestQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${qrData}`;
    }

    async function submitForm() {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        const birth = document.getElementById('regBirth').value;
        if(!name || !phone) { alert("請填寫姓名與電話"); return; }

        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('referrerId') || "";

        document.getElementById('regBtn').disabled = true;
        document.getElementById('regBtn').innerText = "註冊中...";

        fetch(gasUrl, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify({ action: "register", name, phone, birthday: birth, userId: myId, referrerId: referrerId }) 
        }).then(() => {
            alert("註冊成功！");
            // 註冊完直接把資料填入並切換畫面，不 reload
            document.getElementById('ui-guest').style.setProperty('display', 'none', 'important');
            document.getElementById('ui-member').style.setProperty('display', 'block', 'important');
            document.getElementById('userNameDisplay').innerText = `歡迎，${name} 會員`;
            document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${myId}`;
            document.getElementById('userPoints').innerText = "0 pt";
        });
    }

    function handleShare() {
        const shareUrl = `https://oldmapot.github.io/Member_Master/index.html?referrerId=${myId}`;
        const text = `✨ 送你老娘鍋招待券！\n點擊領取：${shareUrl}`;
        const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        alert("推薦連結已複製！");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘的一點心意｜會員中心</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/oldmapot/Member_Master/assets/brand-style.css">
    <script src="https://cdn.jsdelivr.net/gh/oldmapot/Member_Master/assets/brand-logic.js"></script>
    
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main-red: #8b0000; --line-green: #06C755; --bg-cream: #fdf5e6; --text-gray: #333; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: var(--bg-cream); margin: 0; padding: 15px; display: flex; justify-content: center; font-size: 17px; color: var(--text-gray); }
        .card { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--main-red); box-sizing: border-box; text-align: left; }
        h2 { color: var(--main-red); margin: 0 0 15px 0; text-align: center; font-size: 22px; }
        .center { text-align: center; }
        
        /* 重新整理按鈕樣式 */
        .refresh-btn { 
            background: rgba(0,0,0,0.05); color: var(--text-gray); 
            border: none; padding: 8px 15px; border-radius: 20px; 
            font-size: 13px; cursor: pointer; display: block; margin: 0 auto 10px;
            transition: 0.3s;
        }
        .refresh-btn:active { transform: scale(0.9); background: rgba(0,0,0,0.1); }

        .qr-box { text-align: center; margin: 15px 0; }
        .qr-box img { width: 200px; height: 200px; border: 1px solid #eee; padding: 8px; background: #fff; }
        .point-badge { background: var(--main-red); color: white; padding: 20px; border-radius: 15px; margin: 10px 0 20px; text-align: center; position: relative; }
        .point-badge h1 { margin: 5px 0; font-size: 36px; }
        
        .form-group { margin-top: 20px; }
        label { font-weight: bold; margin-bottom: 8px; display: block; font-size: 16px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 17px; }
        .btn-reg { background: var(--main-red); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; }
        .btn-share { background: var(--line-green); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 15px; }
        
        #ui-member, #ui-guest { display: none; }
        
        /* 覆蓋品牌背景顏色以適應原設計 */
        .theme-pot { --brand-bg: #1a1a1a; }
        .theme-sweet { --brand-bg: #FFF9E6; }
    </style>
</head>
<body>

    <div id="brand-loading-mask">
    <div id="brand-icon-box"></div>
    <p id="brand-loading-text"></p>
</div>

    <div class="card">
        <h2 id="brand-title">老娘鍋 x 一點甜</h2>
        
        <div id="ui-member">
            <p id="userNameDisplay" class="center" style="font-weight:bold;"></p>
            <div class="qr-box">
                <img id="memberQr" src="">
                <p style="font-size:14px; color:var(--main-red); font-weight:bold; margin-top:10px;" class="center">結帳請出示此碼集點</p>
            </div>
            
            <button class="refresh-btn" onclick="refreshData()">🔄 點數更新</button>
            
            <div class="point-badge">
                <p style="margin:0; font-size:15px; opacity:0.8;">目前可用點數</p>
                <h1 id="userPoints">0 點</h1>
            </div>
            
            <div style="text-align: left; font-size: 13px; color: #666; line-height: 1.6; background: #fdfaf6; padding: 12px; border-radius: 10px; margin-bottom: 15px;">
                • $1 點 = NT$1 元｜消費享 5% 回饋<br>
                • 推薦好友領招待，再享 2% 回饋
            </div>
            
            <button class="btn-share" onclick="handleShare()">推薦好友領招待禮</button>
        </div>

        <div id="ui-guest">
            </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec";
    const LIFF_ID = "2009625010-p9sVIUWe";
    let myId = "";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            myId = profile.userId;
            
            // 開始檢查會員資料
            await checkMember();
        } catch (e) { 
            console.error(e); 
            if (window.closeBrandLoading) window.closeBrandLoading();
        }
    }

    // 重新整理功能
    async function refreshData() {
        if (window.openBrandLoading) {
            const params = new URLSearchParams(window.location.search);
            const msg = (params.get('from') === 'sweet') ? "正在為您甜點進度..." : "老娘幫你重新刷個新...";
            window.openBrandLoading(msg);
        }
        await checkMember();
    }

    async function checkMember() {
        try {
            const res = await fetch(`${GAS_URL}?action=checkID&userId=${myId}`, { redirect: 'follow' });
            const data = await res.json();
            
            if (data.isMember) {
                document.getElementById('ui-member').style.display = 'block';
                document.getElementById('ui-guest').style.display = 'none';
                document.getElementById('userNameDisplay').innerText = `歡迎，${data.userName} 會員`;
                document.getElementById('userPoints').innerText = `${data.points} pt`;
                document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${myId}`;
            } else {
                showGuestUI();
            }
        } catch (e) { 
            showGuestUI(); 
        } finally {
            // 資料載入完成，關閉品牌動畫
            if (window.closeBrandLoading) window.closeBrandLoading();
        }
    }

    // 其他原本的函數 (showGuestUI, register, handleShare, Modal 等) 保持原樣...
    // ...
    
    init();
</script>
</body>
</html>

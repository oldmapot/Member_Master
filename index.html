<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老娘鍋會員中心</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 這裡放你原本漂亮的 CSS，確保 #loading, #memberPanel, #guestPanel 存在 */
    </style>
</head>
<body>
    <div id="loading">同步資料中...</div>
    <div id="memberPanel" style="display:none;"> </div>
    <div id="guestPanel" style="display:none;"> </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwuMlqWFj3RH0_34JsmOmz4CTyJyJ8hE5UQIgKoEnO4B12aEZoeItu-RHlRByKp115n6A/exec";
const LIFF_ID = "2009625010-p9sVIUWe";
let myId = "";

async function init() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        myId = profile.userId;
        
        // 【最重要】不管有沒有 referrerId，一律先去查身分
        checkStatus();
    } catch(e) { console.log(e); }
}

async function checkStatus() {
    try {
        // 加上 redirect: 'follow' 解決轉圈圈
        const res = await fetch(`${GAS_URL}?action=checkID&userId=${myId}`, { redirect: 'follow' });
        const data = await res.json();
        
        document.getElementById('loading').style.display = 'none';
        if (data.isMember) {
            // 是會員就開會員頁
            document.getElementById('memberPanel').style.display = 'block';
            document.getElementById('guestPanel').style.display = 'none';
            // 更新點數與姓名...
        } else {
            // 沒資料才開註冊頁
            document.getElementById('guestPanel').style.display = 'block';
            document.getElementById('memberPanel').style.display = 'none';
        }
    } catch(e) { 
        // 萬一連線失敗，保險起見顯示註冊頁
        document.getElementById('loading').style.display = 'none';
        document.getElementById('guestPanel').style.display = 'block';
    }
}
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老娘的一點心意</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* ===== 品牌全域變數 ===== */
        .theme-pot { --brand-main: #8b0000; --brand-bg: #fdf5e6; --brand-text: #333; --btn-bg: #8b0000; }
        .theme-sweet { --brand-main: #ff69b4; --brand-bg: #FFF9E6; --brand-text: #5D4037; --btn-bg: #ff69b4; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--brand-bg); margin: 0; padding-bottom: 40px; }

        /* ===== Loading 遮罩 ===== */
        #brand-loading-mask {
            position: fixed; inset: 0; z-index: 9999;
            background-color: var(--brand-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.4s ease;
        }
        #brand-loading-text {
            color: var(--brand-text);
            font-size: 1.1rem; font-weight: bold; margin-top: 1.5rem; letter-spacing: 1px;
        }

        /* ===== 老娘鍋動畫：跳動小鍋 ===== */
        .pot-animation {
            width: 50px; height: 35px; background: var(--brand-main);
            border-radius: 0 0 12px 12px; position: relative;
            animation: pot-jump 0.5s infinite alternate ease-in-out;
        }
        .pot-animation::before, .pot-animation::after {
            content: ''; position: absolute; top: 5px; width: 10px; height: 8px;
            background: var(--brand-main); border-radius: 3px;
        }
        .pot-animation::before { left: -8px; }
        .pot-animation::after { right: -8px; }
        @keyframes pot-jump { to { transform: translateY(-15px); } }

        /* ===== 一點甜動畫：晃動布丁 ===== */
        .pudding-animation {
            width: 45px; height: 40px; background: #FFD166;
            border-radius: 8px 8px 4px 4px; position: relative;
            box-shadow: 0 6px #B07D62 inset;
            animation: pudding-wobble 0.6s infinite ease-in-out;
        }
        @keyframes pudding-wobble {
            0%, 100% { transform: rotate(-8deg) scale(1); }
            50% { transform: rotate(8deg) scale(1.05); }
        }

        /* ===== 會員中心樣式 ===== */
        .header { background: var(--brand-main); color: #fff; padding: 45px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .welcome-quote { font-size: 18px; opacity: 0.95; margin-bottom: 8px; }
        .main-title { font-size: 32px; font-weight: 900; }

        .points-card {
            background: #fff;
            margin: -25px 20px 20px;
            padding: 28px 24px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .points-left { flex: 1; text-align: center; min-width: 120px; }
        .points-label { font-size: 14px; color: #666; margin-bottom: 6px; }
        .points-value { font-size: 48px; font-weight: 900; color: var(--brand-main); line-height: 1.1; }
        .refresh-btn {
            margin-top: 12px;
            padding: 8px 16px;
            border-radius: 12px;
            background: #f7f7f7;
            border: 1px solid #eee;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }

        .action-group-right {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 160px;
            flex-shrink: 0;
        }
        .action-btn {
            padding: 12px 16px;
            border-radius: 16px;
            background: #f9f9f9;
            border: 1px solid #eee;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            color: var(--brand-main);
        }

        .qr-section { background: #fff; margin:0 20px 20px; padding:28px; border-radius:20px; text-align:center; }
        #qrcode { width:180px; height:180px; margin-bottom:12px; border-radius: 12px; background:#fff; }
        .qr-note { font-size:14px; color:#666; font-weight:600; line-height:1.4; }

        .events-double { display: flex; gap: 15px; margin: 0 20px 20px; }
        .event-brand-btn {
            flex: 1; padding: 14px; border-radius: 16px;
            background: var(--brand-main); color: #fff;
            border: none; font-weight: bold; font-size: 16px;
            cursor: pointer; text-align: center;
        }

        .share-btn {
            display: block; width: calc(100% - 40px); margin: 0 auto;
            padding: 18px; border-radius: 20px;
            background: #06C755; color: #fff;
            font-weight: bold; font-size: 18px;
            border: none; cursor: pointer; text-align: center;
        }

        /* ===== 註冊頁 ===== */
        #regUI { display:none; padding:40px 24px; }
        .reg-title { color:var(--brand-main);font-weight:900;text-align:center;font-size:24px;margin-bottom:8px; }
        .reg-subtitle { text-align:center;color:#666;margin-bottom:30px; }
        .reg-item { margin-top:20px; }
        .reg-label { font-size:13px;color:#666;margin-bottom:6px; }
        .reg-input { width:100%;padding:16px;border-radius:14px;border:1px solid #ddd;font-size:16px;box-sizing:border-box; }
        .reg-btn { width:100%;padding:18px;background:var(--brand-main);color:#fff;border:none;border-radius:16px;font-weight:bold;font-size:17px;margin-top:30px;cursor:pointer; }

        /* ===== 彈窗與卡片 ===== */
        .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:3000; }
        .modal-card { background:#fff;width:92%;max-width:420px;border-radius:28px;overflow:hidden;animation:pop 0.3s ease-out; }
        .modal-header { padding:20px;font-weight:bold;border-bottom:1px solid #eee;font-size:20px;text-align:center; }
        .modal-body { padding:20px;max-height:65vh;overflow-y:auto; }
        .close-btn { width:100%;padding:18px;background:#f5f5f5;border:none;font-weight:bold;color:#555;cursor:pointer;font-size:16px; }
        @keyframes pop { from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1} }

        .share-success-card {
            background: linear-gradient(135deg, #06C755 0%, #05a346 100%);
            color: #fff; padding: 30px 20px; border-radius: 20px; text-align: center;
        }
        .share-success-card h3 { margin: 0 0 15px; font-size: 22px; }
        .share-success-card p { font-size: 15px; opacity: 0.9; line-height: 1.6; margin-bottom: 0; }

        .toast { position:fixed;left:50%;bottom:60px;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:12px 20px;border-radius:12px;z-index:9999;display:none;font-size:14px; }

        table { width:100%;border-collapse:collapse;font-size:13px; }
        th { background:#f8f8f8;padding:10px;border-bottom:2px solid #eee; }
        td { padding:10px 6px;border-bottom:1px solid #f0f0f0;text-align:center; }
        .list-row { padding:12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between; }

        @media (max-width: 550px) {
            .points-card { flex-direction: column; }
            .action-group-right { width: 100%; flex-direction: row; justify-content: center; }
            .action-btn { flex: 1; white-space: nowrap; }
        }
    </style>
</head>
<body>

<div id="brand-loading-mask">
    <div id="brand-icon-box"></div>
    <div id="brand-loading-text">載入中...</div>
</div>

<div id="memberUI" style="display:none">
    <div class="header">
        <div class="welcome-quote" id="welcomeQuote"></div>
        <div class="main-title">老娘的一點心意</div>
    </div>

    <div class="points-card">
        <div class="points-left">
            <div class="points-label">可用點數資產</div>
            <div class="points-value" id="pointsDisplay">--</div>
            <button class="refresh-btn" onclick="fetchData(true)">🔄 重新整理</button>
        </div>
        <div class="action-group-right">
            <button class="action-btn" onclick="openProfile()">👤 個人資料</button>
            <button class="action-btn" onclick="openReferral()">👥 推薦名單</button>
            <button class="action-btn" onclick="openHistory()">📜 點數明細</button>
        </div>
    </div>

    <div class="qr-section">
        <img id="qrcode" src="" alt="會員QR碼">
        <div class="qr-note">結帳時請出示此碼，結帳後離櫃恕不再累積點數</div>
    </div>

    <div class="events-double">
        <button class="event-brand-btn" onclick="openEventsByBrand('老娘鍋')">🍲 老娘精選</button>
        <button class="event-brand-btn" onclick="openEventsByBrand('一點甜')">🍰 一點甜好康</button>
    </div>

    <button class="share-btn" onclick="shareRecommend()">🚀 分享推薦碼，享好友消費回饋</button>
</div>

<div id="regUI" style="display:none">
    <h2 class="reg-title" id="regTitle">會員註冊</h2>
    <p class="reg-subtitle" id="regSubtitle">填寫資料即可累積點數、兌換優惠</p>
    <div class="reg-item">
        <div class="reg-label">姓名</div>
        <input id="regName" class="reg-input" placeholder="請輸入姓名">
    </div>
    <div class="reg-item">
        <div class="reg-label">手機（格式：09XX-XXX-XXX）</div>
        <input id="regPhone" class="reg-input" placeholder="0900-000-000" maxlength="12">
    </div>
    <div class="reg-item">
        <div class="reg-label">生日（享生日專屬優惠，註冊後無法修改）</div>
        <input type="date" id="regBirthday" class="reg-input">
    </div>
    <button class="reg-btn" onclick="doRegister()">完成註冊</button>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header" id="modalTitle"></div>
        <div class="modal-body" id="modalBody"></div>
        <button class="close-btn" onclick="closeModal()">關閉</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 全域與初始化判斷 =====
(function() {
    const params = new URLSearchParams(window.location.search);
    window.currentBrand = params.get('from') === 'so' ? 'sweet' : 'pot';
    document.documentElement.className = (window.currentBrand === 'sweet') ? 'theme-sweet' : 'theme-pot';
})();

const GAS_URL = "https://script.google.com/macros/s/AKfycbw6VCyK1j0rQfIpZlW-TIw7JWDHRuSIxGGSR8YDh0z2AmBlMbLdLbLdlVh5gRHb-0Knlw/exec";
const LIFF_ID = "2009625010-p9sVIUWe";
let userId = '';
let userData = null;
let currentFrom = 'pot';
let referrerParam = '';

// ===== 基礎 UI 函式 =====
function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(()=>{ t.style.display = 'none'; }, 2200);
}
function closeModal(){ document.getElementById('modal').style.display='none'; }
function openModal(title, contentHtml) {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalBody').innerHTML = contentHtml;
    document.getElementById('modal').style.display = 'flex';
}

function openEventsByBrand(brand) {
    if(!userData) { showToast('請稍後再試'); return; }
    let eventsList = brand === '老娘鍋' ? (userData.omEvents || []) : (userData.swEvents || []);
    let contentHtml = eventsList.length ? eventsList.map(ev => `<div style="padding:16px;border-bottom:1px solid #f0f0f0">🎁 ${escapeHtml(ev)}</div>`).join('') : '<div style="padding:40px;text-align:center;color:#999;">目前暫無活動</div>';
    openModal(`${brand} 精選活動`, contentHtml);
}

// ===== 資料抓取 =====
async function fetchData(showReloadToast = false) {
    if(!userId) return;
    try {
        const url = `${GAS_URL}?action=checkID&userId=${encodeURIComponent(userId)}&from=${currentFrom === 'sweet' ? 'so' : 'om'}&t=${Date.now()}`;
        const response = await fetch(url);
        const data = await response.json();
        userData = data;

        if(!userData.isMember) {
            document.getElementById('brand-loading-mask').style.display = 'none';
            document.getElementById('regUI').style.display = 'block';
            document.getElementById('regTitle').innerText = (currentFrom === 'sweet') ? '一點甜 會員註冊' : '老娘鍋 會員註冊';
            return;
        }

        document.getElementById('pointsDisplay').innerText = userData.profile?.points ?? 0;
        document.getElementById('welcomeQuote').innerText = userData.welcomeQuote || (currentFrom === 'sweet' ? '🍰 今天來一點甜吧！' : '🍲 老娘鍋暖心招待');
        document.getElementById('qrcode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(userId)}`;
        
        const mask = document.getElementById('brand-loading-mask');
        mask.style.opacity = '0';
        setTimeout(() => mask.style.display = 'none', 400);
        
        document.getElementById('memberUI').style.display = 'block';
        if(showReloadToast) showToast('✅ 資料已更新');
    } catch(err) {
        console.error(err);
        showToast('連線異常，請重整頁面');
    }
}

// ===== 功能區 =====
function openProfile(){
    if(!userData || !userData.profile) {
        showToast('讀取中，請稍候...');
        fetchData();
        return;
    }
    const p = userData.profile;
    const content = `
        <div style="line-height:2.4;font-size:16px;padding:10px">
            <div><b>姓名：</b>${escapeHtml(p.name || '未設定')}</div>
            <div><b>手機：</b>${escapeHtml(p.phone || '未設定')}</div>
            <div><b>生日：</b>${escapeHtml(p.birthday || '未設定')} <span style="color:#e74c3c;font-size:12px">(不可修改)</span></div>
            <div><b>會員等級：</b>${escapeHtml(p.level || '一般會員')}</div>
        </div>`;
    openModal('👤 個人資料', content);
}

function openReferral(){
    if(!userData) return;
    let list = userData.myReferrals?.length ? userData.myReferrals.map(i=>`<div class="list-row"><span>${escapeHtml(i.name)}</span><span>${escapeHtml(i.date)}</span></div>`).join('') : '<div style="padding:20px;color:#999;text-align:center">尚無推薦朋友</div>';
    openModal('👥 推薦名單', `<div style="padding:12px;background:#f9f9f9;border-radius:12px;margin-bottom:16px"><b>我的推薦人：</b> ${userData.myReferrer || '無'}</div>${list}`);
}

function openHistory(){
    if(!userData) return;
    let rows = userData.history?.length ? userData.history.map(h=>`<tr><td>${escapeHtml(h.date)}</td><td>${h.gain}</td><td>${h.spend||0}</td></tr>`).join('') : '<tr><td colspan="3">尚無紀錄</td></tr>';
    openModal('📜 點數明細', `<table><thead><tr><th>日期</th><th>本人獲取點</th><th>好友回饋點</th><th>折抵</th></tr></thead><tbody>${rows}</tbody></table>`);
}

// ===== 分享功能：複製連結 + 漂亮卡片 =====
function shareRecommend() {
    if(!userId) return showToast('資料載入中');
    const branchName = currentFrom === 'sweet' ? '一點甜' : '老娘鍋';
    const shareUrl = `https://liff.line.me/${LIFF_ID}?from=${currentFrom === 'sweet' ? 'so' : 'om'}&referrer=${userId}`;
    
    // 執行複製
    const el = document.createElement('textarea');
    el.value = shareUrl;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);

    // 彈出漂亮卡片
    const content = `
        <div class="share-success-card">
            <h3>✅ 複製成功！</h3>
            <p>推薦連結已存入您的剪貼簿。<br>趕緊發送給好友，<br>一起領取${branchName}招待禮吧！🎁</p>
        </div>`;
    openModal('分享推薦碼', content);
}

// ===== 註冊與輸入優化 =====
async function doRegister(){
    const name = document.getElementById('regName').value.trim();
    let phoneRaw = document.getElementById('regPhone').value.trim();
    const birthday = document.getElementById('regBirthday').value;
    if(!name || !birthday || !/^09\d{2}-\d{3}-\d{3}$/.test(phoneRaw)) return showToast('❌ 請檢查輸入資料');

    const payload = { action:'register', userId, name, phone:phoneRaw.replace(/-/g,''), birthday, referrerId:referrerParam, from:currentFrom==='sweet'?'so':'om' };
    try {
        const res = await fetch(GAS_URL, { method:'POST', body:JSON.stringify(payload) });
        const result = await res.json();
        if(result.success){
            showToast('✅ 註冊成功');
            fetchData();
        } else { showToast(result.message); }
    } catch(e) { showToast('連線失敗'); }
}

function setupPhoneInput() {
    document.getElementById('regPhone')?.addEventListener('input', function(e){
        let v = e.target.value.replace(/\D/g,'').slice(0,10);
        if(v.length > 7) v = v.slice(0,4)+'-'+v.slice(4,7)+'-'+v.slice(7);
        else if(v.length > 4) v = v.slice(0,4)+'-'+v.slice(4);
        e.target.value = v;
    });
}

function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

// ===== LIFF 初始化 =====
async function initLiff() {
    const urlParams = new URLSearchParams(window.location.search);
    currentFrom = urlParams.get('from') === 'so' ? 'sweet' : 'pot';
    referrerParam = urlParams.get('referrer') || '';
    
    // 載入品牌動畫
    const iconBox = document.getElementById('brand-icon-box');
    iconBox.innerHTML = `<div class="${currentFrom === 'sweet' ? 'pudding-animation' : 'pot-animation'}"></div>`;
    
    setupPhoneInput();

    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        userId = profile.userId;
        fetchData();
    } catch(err) {
        console.error(err);
        document.getElementById('brand-loading-mask').style.display = 'none';
        showToast('請在 LINE 中開啟');
    }
}

initLiff();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老娘鍋會員</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto;">
    <h1 style="color:#8b0000;">老娘鍋 x 一點甜</h1>
    
    <div id="loading" style="text-align:center; padding:40px;">載入中...</div>
    
    <div id="memberPanel" style="display:none;">
        <div style="background:#8b0000; color:white; padding:20px; border-radius:12px; text-align:center;">
            <p>目前可用點數</p>
            <h2 id="points" style="font-size:40px; margin:10px 0;">0</h2>
            <p>pt</p>
        </div>
        <div style="text-align:center; margin:20px 0;">
            <img id="memberQr" style="width:180px; background:white; padding:10px; border-radius:12px;">
        </div>
        <button onclick="share()" style="width:100%; padding:14px; background:#06C755; color:white; border:none; border-radius:12px; font-size:16px;">推薦好友</button>
    </div>
    
    <div id="guestPanel" style="display:none;">
        <div style="background:#fff5f0; padding:15px; border-radius:12px; margin-bottom:20px;">
            🎁 好友專屬招待禮
        </div>
        <div style="text-align:center; margin:20px 0;">
            <img id="guestQr" style="width:180px; background:white; padding:10px; border-radius:12px;">
        </div>
        <input type="text" id="name" placeholder="真實姓名" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <input type="tel" id="phone" placeholder="手機號碼" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <input type="date" id="birth" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <button onclick="register()" style="width:100%; padding:14px; background:#8b0000; color:white; border:none; border-radius:12px; font-size:16px;">加入會員</button>
    </div>
    
    <div id="errorPanel" style="display:none; background:#ffebee; padding:20px; border-radius:12px; text-align:center;">
        <p>連線失敗</p>
        <button onclick="location.reload()" style="margin-top:10px; padding:10px 20px;">重新整理</button>
    </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby1YCNUjtY3ZoTLJmeN86Y1UMBKXFJFcvWkdBupwnwByEWCtzVHjp09A6_3twyCepTBPg/exec";
const LIFF_ID = "2009625010-p9sVIUWe";
let userId = null;
const urlParams = new URLSearchParams(window.location.search);
const referrerId = urlParams.get('referrerId');

async function init() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        userId = profile.userId;
        await checkMember();
    } catch(e) { showError(); }
}

async function checkMember() {
    showLoading();
    try {
        // 加上 redirect: 'follow' 解決 GAS 轉址導致的轉圈圈
        const res = await fetch(`${GAS_URL}?action=checkID&userId=${userId}`, { redirect: 'follow' });
        const data = await res.json();
        if (data.isMember) {
            showMember(data.userName, data.points);
        } else {
            showGuest();
        }
    } catch(e) { 
        console.error(e);
        // 如果連線失敗，4秒後強行進入訪客頁避免死機
        setTimeout(showGuest, 4000); 
    }
}

async function register() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const birth = document.getElementById('birth').value;
    if (!name || !phone || !birth) { alert("請填寫完整"); return; }

    showLoading();
    try {
        // 使用 no-cors 解決跨域問題
        await fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                action: "register", name, phone, birthday: birth, 
                userId, referrerId: referrerId || ""
            })
        });
        alert("註冊資料已送出！");
        setTimeout(checkMember, 2000); // 延遲2秒等資料寫入後重新抓取
    } catch(e) { alert("註冊失敗"); showGuest(); }
}

function showLoading() { document.getElementById('loading').style.display = 'block'; document.getElementById('memberPanel').style.display = 'none'; document.getElementById('guestPanel').style.display = 'none'; }
function showMember(name, points) { document.getElementById('loading').style.display = 'none'; document.getElementById('memberPanel').style.display = 'block'; document.getElementById('points').innerText = points; document.getElementById('memberQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${userId}`; }
function showGuest() { document.getElementById('loading').style.display = 'none'; document.getElementById('guestPanel').style.display = 'block'; const qrd = referrerId || userId; document.getElementById('guestQr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${qrd}`; }

init();
</script>
</body>
</html>

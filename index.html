<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老娘鍋會員註冊</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: #fdf5e6; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #8b0000; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #8b0000; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h2>老娘鍋 x 一點甜</h2>
        <input type="text" id="name" placeholder="請輸入姓名">
        <input type="tel" id="phone" placeholder="請輸入手機號碼">
        <input type="date" id="birthday">
        <button id="submitBtn" onclick="submitForm()">確認註冊</button>
    </div>

    <script>
        let userId = "";

        // 初始化 LIFF 並抓取用戶 ID
        async function initLIFF() {
            try {
                // 這裡的 liffId 務必填入你 LINE Developers 後台申請的 ID
                await liff.init({ liffId: "2009625010-p9sVIUWe" }); 
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    userId = profile.userId;
                } else {
                    liff.login();
                }
            } catch (e) { console.error("LIFF 失敗", e); }
        }
        initLIFF();

        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                birthday: document.getElementById('birthday').value,
                userId: userId
            };

            if(!data.name || !data.phone || !userId) {
                alert("請完整填寫或等待 ID 讀取"); return;
            }

            btn.disabled = true;
            btn.innerText = "傳送中...";

            // 這裡填入你 GAS 的網頁應用程式 URL
            try {
                await fetch("https://script.google.com/macros/s/AKfycbwwXAPVNQ-CJ3MfcxBebxtthvHGwrK9YTXGS_a5yqL2Ss7JAF1jJoAFSHOHWx-AdhT-Cw/exec", {
                    method: "POST",
                    mode: "no-cors", 
                    body: JSON.stringify(data)
                });
                alert("註冊成功！");
                liff.closeWindow(); // 自動關閉視窗回 LINE
            } catch (e) {
                alert("註冊失敗，請稍後再試");
                btn.disabled = false;
                btn.innerText = "確認註冊";
            }
        }
    </script>
</body>
</html>

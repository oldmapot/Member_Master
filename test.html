<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老娘鍋測試</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h1>老娘鍋測試</h1>
    <div id="status">載入中...</div>
    <button id="btn">測試註冊</button>
    <div id="result"></div>
    <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwuMlqWFj3RH0_34JsmOmz4CTyJyJ8hE5UQIgKoEnO4B12aEZoeItu-RHlRByKp115n6A/exec";
    const LIFF_ID = "2009625010-p9sVIUWe";
    let userId = null;
    
    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            userId = profile.userId;
            document.getElementById('status').innerHTML = "已登入: " + userId;
            await checkMember();
        } catch(e) {
            document.getElementById('status').innerHTML = "錯誤: " + e.message;
        }
    }
    
    async function checkMember() {
        try {
            const res = await fetch(GAS_URL + "?action=checkID&userId=" + userId);
            const data = await res.json();
            if (data.isMember) {
                document.getElementById('status').innerHTML = "會員: " + data.userName;
            } else {
                document.getElementById('status').innerHTML = "非會員，請註冊";
                document.getElementById('btn').style.display = "block";
            }
        } catch(e) {
            document.getElementById('status').innerHTML = "檢查失敗: " + e.message;
        }
    }
    
    async function register() {
        document.getElementById('result').innerHTML = "註冊中...";
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "register",
                    name: "測試用戶",
                    phone: "0912345678",
                    birthday: "2000-01-01",
                    userId: userId,
                    referrerId: ""
                })
            });
            const result = await res.text();
            document.getElementById('result').innerHTML = "結果: " + result;
            if (result === "SUCCESS") alert("註冊成功！");
            else if (result === "DUPLICATE") alert("已是會員！");
            else alert("失敗: " + result);
        } catch(e) {
            document.getElementById('result').innerHTML = "錯誤: " + e.message;
        }
    }
    
    document.getElementById('btn').onclick = register;
    init();
    </script>
</body>
</html>

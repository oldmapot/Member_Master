<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老娘領地｜店員集點系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #e67e22; --secondary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--secondary); }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid var(--bg); padding-bottom: 15px; margin-bottom: 20px; }
        .badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-scan { background: var(--secondary); color: white; }
        .btn-submit { background: var(--primary); color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading">系統驗證中...</div>

<div class="container" id="main-ui" style="display: none;">
    <div class="header">
        <h2 id="staff-name">店員夥伴</h2>
        <span class="badge" id="staff-branch">讀取中...</span>
    </div>

    <div class="form-group">
        <label>1. 掃描顧客會員碼</label>
        <button class="btn btn-scan" onclick="handleScan()">📷 開啟相機掃描</button>
        <input type="text" id="customerId" placeholder="掃描後自動帶入 ID" style="margin-top:10px; background:#f9f9f9;" readonly>
    </div>

    <div class="form-group">
        <label>2. 輸入實付金額 (NT$)</label>
        <input type="number" id="amount" placeholder="請輸入結帳金額" inputmode="numeric">
    </div>

    <button class="btn btn-submit" id="submitBtn" onclick="handleSubmit()">確認過卡集點</button>
</div>

<script>
    // --- 配置區 ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxrlYGoxOuTUJ9y9YQreRRNpSYly2c7yGuOw0ppPmfJJL7xLo6RLZDBF2htCaHwnB6Y/exec"; // ⚠️ 請更換為你的 GAS Web App URL
    let staffInfo = {};

    async function initLIFF() {
        try {
            await liff.init({ liffId: "2009625641-AYIKoXbw" }); // ⚠️ 請更換為你的店員版 LIFF ID
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            await verifyStaff();
        } catch (err) {
            alert("LIFF 初始化失敗: " + err);
        }
    }

    async function verifyStaff() {
        const profile = await liff.getProfile();
        const urlParams = new URLSearchParams(window.location.search);
        const keyword = urlParams.get('k'); // 從網址抓取 ?k=掃碼999

        if (!keyword) {
            alert("缺少驗證關鍵字，請從官方帳號輸入正確指令");
            liff.closeWindow();
            return;
        }

        try {
            const response = await fetch(`${GAS_URL}?action=staffLogin&userId=${profile.userId}&keyword=${keyword}`);
            const result = await response.json();

            if (result.success) {
                staffInfo = result;
                document.getElementById('staff-name').innerText = `夥伴：${result.name}`;
                document.getElementById('staff-branch').innerText = result.branch;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
            } else {
                alert("身分驗證失敗：您不在白名單中或關鍵字錯誤");
                liff.closeWindow();
            }
        } catch (err) {
            alert("網路連線錯誤: " + err);
        }
    }

    async function handleScan() {
        if (!liff.isApiAvailable('scanCodeV2')) {
            alert("您的裝置不支援掃描功能，請確保在 LINE App 內開啟");
            return;
        }
        const result = await liff.scanCodeV2();
        document.getElementById('customerId').value = result.value;
    }

    async function handleSubmit() {
        const customerId = document.getElementById('customerId').value;
        const amount = document.getElementById('amount').value;
        const btn = document.getElementById('submitBtn');

        if (!customerId || !amount || amount <= 0) {
            alert("請完整填寫掃碼資訊與金額");
            return;
        }

        if (!confirm(`確認為顧客集點嗎？\n金額：${amount}\n分店：${staffInfo.branch}`)) return;

        btn.disabled = true;
        btn.innerText = "處理中...";

        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "addPoints",
                    customerId: customerId,
                    amount: amount,
                    branch: staffInfo.branch,
                    staffName: staffInfo.name
                })
            });
            const text = await res.text();

            if (text === "SUCCESS") {
                alert("✅ 集點成功！點數已更新至流水帳。");
                location.reload(); // 成功後刷新頁面準備下一筆
            } else if (text === "NOT_FOUND") {
                alert("❌ 找不到此會員，請確認顧客是否已完成註冊。");
                btn.disabled = false;
                btn.innerText = "確認過卡集點";
            } else {
                alert("系統錯誤: " + text);
                btn.disabled = false;
                btn.innerText = "確認過卡集點";
            }
        } catch (err) {
            alert("發送失敗: " + err);
            btn.disabled = false;
        }
    }

    window.onload = initLIFF;
</script>

</body>
</html>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxrlYGoxOuTUJ9y9YQreRRNpSYly2c7yGuOw0ppPmfJJL7xLo6RLZDBF2htCaHwnB6Y/exec"; 
const LIFF_ID = "2009625641-AYIKoXbw"; 

let config = {}, customerId = "", currentPoints = 0, staff = {};
let isScanning = false; // 防止重複點擊

// 彈窗控制
function showModal(html) {
    document.getElementById('modalText').innerHTML = html;
    document.getElementById('customModal').style.display = 'flex';
}
function closeModal() {
    document.getElementById('customModal').style.display = 'none';
}

async function init() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const urlParams = new URLSearchParams(window.location.search);
        const key = urlParams.get('k');
        const profile = await liff.getProfile();
        
        const res = await fetch(`${GAS_URL}?action=staffLogin&userId=${profile.userId}&keyword=${key}`);
        staff = await res.json();
        
        if(staff.success) {
            document.getElementById('shop-name').innerText = staff.branch;
            document.getElementById('staff-name').innerText = staff.name;
            document.getElementById('role-text').innerText = staff.role;
            document.getElementById('scanBtn').disabled = false;
        } else {
            document.getElementById('shop-name').innerText = "❌ 無存取權限";
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('scanBtn').style.background = "#ccc";
            document.getElementById('scanBtn').innerText = "權限不足，無法掃描";
            showModal("<p style='color:red; font-weight:bold;'>⚠️ 老娘領地，您的ID未得到授權！<br>請聯絡系統管理員授權。</p>");
        }
    } catch (e) {
        alert("系統啟動失敗: " + e.message);
        console.error("init error:", e);
    }
}

// ✅ 修復：完整實作 handleScan()
async function handleScan() {
    if (isScanning) return; // 防止重複點擊
    isScanning = true;
    const scanBtn = document.getElementById('scanBtn');
    scanBtn.disabled = true;
    scanBtn.innerText = "掃描中...";

    try {
        // 1. 檢查 API 是否可用
        if (!liff.isApiAvailable('scanCodeV2')) {
            showModal("<p style='color:red;'>⚠️ 您的 LINE 版本過舊，不支援掃碼功能<br>請更新 LINE 至最新版</p>");
            return;
        }

        // 2. 開啟相機掃描
        const result = await liff.scanCodeV2();
        if (!result || !result.value) {
            showModal("<p>⚠️ 未偵測到有效條碼</p>");
            return;
        }

        const rawID = String(result.value).trim();
        console.log("掃描結果:", rawID);

        // 3. 新客招待禮判斷
        if (rawID.toUpperCase().includes("GIFT_BY_")) {
            customerId = "";
            document.getElementById('member-ui').style.display = 'none';
            document.getElementById('form-ui').classList.add('locked');
            showModal(`
                <h3 style="color:#e91e63; margin-top:0;">🎁 新客招待禮確認</h3>
                <hr>
                <p><b>招待內容：</b>小菜一份 或 霜淇淋一支</p>
                <p style="font-size:14px; color:#666;">⚠️ 這是新客專用碼，請引導顧客完成註冊後再掃會員碼集點。</p>
            `);
            return;
        }

        // 4. 一般會員查詢
        customerId = rawID;
        if (window.openBrandLoading) window.openBrandLoading("老娘正在查詢會員資料...");

        const res = await fetch(`${GAS_URL}?action=checkID&userId=${customerId}&branch=${staff.branch}`, {
            redirect: "follow" // 解決 GAS 302 轉向問題
        });
        const data = await res.json();

        if (window.closeBrandLoading) window.closeBrandLoading();

        if (data.isMember) {
            document.getElementById('member-ui').style.display = 'block';
            document.getElementById('form-ui').classList.remove('locked');
            document.getElementById('cus-name').innerText = data.userName || "顧客";
            document.getElementById('cus-pts').innerText = data.points || 0;
            currentPoints = Number(data.points) || 0;
            config = data.config || {};
            doCalc();
        } else {
            showModal("<p style='color:red;'>⚠️ 查無此會員編號！</p>");
        }

    } catch (err) {
        console.error("掃描錯誤:", err);
        if (window.closeBrandLoading) window.closeBrandLoading();
        
        // 常見錯誤提示
        if (err.message.includes("permission")) {
            showModal("<p style='color:red;'>⚠️ 相機權限被拒絕<br>請在手機設定開啟 LINE 相機權限</p>");
        } else if (err.message.includes("canceled")) {
            showModal("<p>掃描已取消</p>");
        } else {
            showModal(`<p style='color:red;'>⚠️ 掃描失敗：${err.message}</p>`);
        }
    } finally {
        isScanning = false;
        scanBtn.disabled = false;
        scanBtn.innerText = "📷 啟動相機掃描";
    }
}

function toggleMode() {
    const isTicket = document.getElementById('ticketMode').checked;
    document.getElementById('normal-fields').style.display = isTicket ? 'none' : 'block';
    document.getElementById('ticket-fields').style.display = isTicket ? 'block' : 'none';
    doCalc();
}

function doCalc() {
    if (!config.earnRate) return;
    const isTicket = document.getElementById('ticketMode').checked;
    
    let newPts = 0, redeem = 0;
    
    if (isTicket) {
        const tBuy = Number(document.getElementById('buyTicket').value) || 0;
        newPts = Math.floor(tBuy * (config.ticketRate || 0));
    } else {
        const total = Number(document.getElementById('totalSpend').value) || 0;
        const tPay = Number(document.getElementById('ticketSpend').value) || 0;
        const settleBase = Math.max(0, total - tPay);
        
        const maxRedeem = (settleBase >= (config.minSpend || 0)) 
            ? Math.min(currentPoints, Math.floor(settleBase * (config.maxRate || 0))) 
            : 0;
        document.getElementById('max-hint').innerText = maxRedeem;
        
        redeem = Number(document.getElementById('redeemAmount').value) || 0;
        if (redeem > maxRedeem) {
            redeem = maxRedeem;
            document.getElementById('redeemAmount').value = maxRedeem;
        }
        newPts = Math.floor((settleBase - redeem) * (config.earnRate || 0));
    }
    
    document.getElementById('new-pts').innerText = newPts;
    document.getElementById('after-pts').innerText = (currentPoints - redeem + newPts);
}

async function submitData() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = "處理中...";

    const payload = {
        action: "addPoints",
        isTicketMode: document.getElementById('ticketMode').checked,
        customerId: customerId,
        branch: staff.branch,
        staffName: staff.name,
        staffRole: staff.role,
        totalSpend: Number(document.getElementById('totalSpend').value) || 0,
        ticketSpend: Number(document.getElementById('ticketSpend').value) || 0,
        redeemAmount: Number(document.getElementById('redeemAmount').value) || 0,
        buyTicket: Number(document.getElementById('buyTicket').value) || 0,
        earnRate: config.earnRate || 0,
        ticketRate: config.ticketRate || 0,
        refRate: config.refRate || 0
    };

    try {
        const res = await fetch(GAS_URL, { 
            method: "POST", 
            body: JSON.stringify(payload),
            redirect: "follow"
        });
        if (res.ok) {
            alert("結帳與股東分紅發放完成！");
            liff.closeWindow();
        } else {
            throw new Error("伺服器回應錯誤");
        }
    } catch (e) {
        alert("提交失敗: " + e.message);
        btn.disabled = false;
        btn.innerText = "重新提交";
    }
}

// 頁面載入完成後初始化
window.addEventListener('load', init);
</script>
